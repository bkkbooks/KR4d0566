body:
  text: 樵雲獨唱卷一元葉顒撰古詩玩月天濶海波平飛空一鏡明烏栖烟樹冷蟾浴石潭清素魄流金液孀娥舞玉京周旋雲鬢亂縹眇羽衣輕短世人空老長生藥未成桂林秋萬頃茅屋夜三更芳砌鋪氷雪疏簾揚水晶穿窗微㺯色當戶寂無聲屢動袁宏興狂呼庾亮名神光億萬丈照我七尺形我喜不能寐起坐塵夢醒凉飈吹華髮霜髦被長纓登髙發清嘯萬壑虛泠泠長天净如洗滿座人皆驚清虛異人境蕭爽真蓬瀛胡為生塵土汨沒勞經營安得齊雲梯獨步逰黃庭瓊樓恣觀覽呼吸瑶華精吟詠玩佳景千秋遺世情幅巾杖屨晚逰南北山間興賦南峰翠凝黛北巘青堆藍橫空青翠色照眼覆玉環峩峩金芙蓉迥出兩嶼間層巒挺竒秀怪石蹲堅頑孤髙處士容窈窕佳人顔處士氣節剛佳人體態間嶤岧幾千尺絶頂難躋攀俯視衆山小下列臣妾班尊重朝諸侯峻險服百蠻檜柏崇岡巔蓀芷淺澗灣松風度長林玉珮鳴珊珊寒泉潄石齒琴瑟聲潺潺下有猿猱飛上有雲往還老翁居其中霜眉鬢斕斑野服白接䍦絲絛青玉環林泉日徜徉杖䇿時盤桓幽尋樂有餘清賞興不慳壺觴雜尊俎談笑生餘歡遊心天地外無復思塵寰寧憂宦海深豈畏世路艱風林塵慮空雲榻詩夢殘起視萬松頂素月流寒山夢中役夢中亦役役醒後愈囂囂囂囂更役役暮暮還朝朝奔馳天地老汨沒嵗月消貧賤安吾常不泰復不驕峰頂絶㳙流海底無炎熇崇岡不受浸洪濤揆容燒變化乃浮雲喧轟實狂潮滄海豈加深青山靡增髙人生本有性益損無纎毫胡為百年間緑鬢成霜髦區區聲利場秋風吹征袍迅速驚烏兔攀緣愧猿猱塵韁日縈絆勢焰時煎熬行將脫塵俗富貴輕鴻毛聳身烟雲端矯首謝俊豪江南懷古仗劍出西逰來逰帝王州登髙望故國感慨彈箜篌長歌四五發雲物慘不收歌聲忽悲壯江漢不敢流峩峩天目山王氣今已收英主從北來長驅勢莫留浮雲捲旌旗天兵動戈矛國破佳人死時危志士憂遂令歌舞地夜雨鳴松楸野殿莓苔古荒城鳥鼠秋茫茫古帝魂千古不可求神飛故宫逺月出西陵幽凄凉白雲鄉寂寞芳草洲我欲弔古跡落日寒颼颼無言一尊酒悲風起間愁古意三首我本山中人不為世網牽寓情猿鶴間寄興鷗鷺邉掃花净石徑烹茶汲溪泉神逰三洞雲耳洗千尺淵兩手㺯明月雙腳踏紫烟胡為塵埃中脫屣未斷緣動有饑渴憂幸無勢利纒何當駕天風飛上青峰巔聳身天地外凝心混沌先俯首謝人世一笑千千年堂堂七尺軀處此人間世秋月與春花宴賞長遊戲杯酒屢勸斟拚飲寧辭醉焉能百年中遽作千載計俯仰天地寬久客不知愧安得生羽翰嘯入烟霞去從兹億萬古瀟灑風塵外夷齊偕盜跖耳目略相類樗櫟雜倚桐枝葉良不異薰蕕稍有殊妍醜從此始鳬短鶴翎長諒不殊此理得失了莫齊一笑天地裏我出何所適我出何所適行吟對清暉著我烟霞屐製我芙蓉衣天風扶瘦策山雲鎖幽扉下同麋鹿逰上與猿鶴飛小草陳野色幽花發餘輝無一不自得深愧疇昔非嗟彼世網中對面觸禍機樽俎潜鴆毒笑談雜嘲譏甘心陷危辱疇能察先幾世緣吾已斷世好吾已微惟有金華峰相看不曾違榮華雖足貴林泉不如歸去去不復返永食南山薇我家北山下我家北山下脫冠解塵襟古屋三五間秋風白雲深功名不掛口豈受嵗月侵青山長在眼白髮任滿簮有酒可以斟有詩可以吟野禽可當曲澗水可當琴醉行無雅態狂歌有餘音逍遙黃葉徑蕭散清風林凉飈吹我鬢凉月洗我心風靜月不留我心無古今題唐子華春雲出谷圗雲住山色佳雲去山骨瘦雲物屢變更青山但如舊子華亦何人胸有山水痼嵳峩萬叠青收拾在尺素春雲去何之出谷漸彌布滃鬱復氤氲天下期蓋覆或然化甘霖江山起烟霧枯槁及林木巨細沾雨露慎勿謾遮天掩蔽激衆怒無心我亦雲偶出非有故讀書幸不多早被儒冠誤巍然抗髙節要與雲同步得失費卷舒坐閲嵗月度富貴情易圗不義愧攀附負郭二頃田自足慰衰暮殷勤送雲出我欲尋歸路挽琳荆山上人大德庚子春生我及此公同庚復同道同逰金芙蓉窮途事多違志願始不同公葺芰荷衣長嘯栖丹峰賦詩雜風騷屈宋或可宗字畫尤俊健下筆儕王鍾顛張與醉素豈敢稱書工從容笑語間已足驚兒童况負此二長儘可開盲聾奈何知者寡栖栖嘆無逢我抱七尺軀混迹塵埃中開口談世事吐氣如長虹性僻多忤物世俗似不容拂衣青山下浩歌樂無窮長琴彈夜月短笛吹天風無可無不可豈復憂窮通公今已下世年夀胡不豐我老天地裡巋然成一翁平生襪線才愧乏補報功同生不同歸又復異始終出處了莫齊嘆息天宇空題松雲齊十五韻青松如舞蛟白雲如遊龍龍遊化甘雨與世為年豐蛟舞散清影利爪拏髙穹二者無限竒盡入幽人宫幽人室懸磬隱約松雲中松秀恱耳目雲生蕩心胸讀書坐雲石鼓琴雜松風無往不自得深喜世慮空披雲採松花何啻食萬鍾萬鍾食有盡松花味無窮松雲幸無恙天地同始終扶笻一相顧摩雲撫孤松問松幾何年適與雲㑹同松靜了不言雲去尋無踪回首萬峯頂但見山重重丙申六月十六日軍亂奚德基賦詩紀事張純誠袖其詩來求和用韻述闕云張九四據蘇州發兵五百人赴杭省軍遂反襲干戈久不息百苦無一樂縣官急徴需貧富􅊖籠絡西州正擊賊空拳日相搏賊馬當道馳賊舟沿海泊盜賊固梟張官軍愈鷹掠征討五六年賊勢未便削朝憂萬甑空暮嘆衣袖薄㸃軍五百輩顧望纍退却太倉萬斛粟食爾欲深托餘粒猶在咽吐之若糟粕返斾擬攻城長刀忍相著傷心百姓財剽奪入已槖朝廷養此曹不啻如巨膊如何負國恩幸然尋就縛老夫鐡石腸見此淚迸落形容為枯槁肌膚倍蕭索深悲世事非屢日情懷惡皇天未厭亂旱魃尤肆虐不雨逾半年何由增廪糳天道既靡常人心益惶霍民食轉艱難軍儲盍圗度終朝僅一餐無力太儉約雖免死甲兵猶恐填溝壑丈夫幸聽之未用遽驚愕牧守任龔黃將帥命李郭牧布撫字恩將展經濟略天下不日清隂霾散寥廓同前題下字韻二首叛軍日驕橫六月反城下長竿揭旌旗羣凶列行伍蘭江接金華膏血腥草莽老弱皆竄亡奔馳實勞苦﨑嶇扶父翁艱難負兒女萬死獲一生行李何暇取饑餓復驚惶逢人語無緒數里絶行踪孤村盡禾黍亂後始得歸飄零如逆旅蒼烟銷荆扉青苔封石礎多謝故山雲護我彈琴所兵驕亂紀律蕩然無上下雖乏噲等才恥與噲等伍江南久喪亂州郡俱榛莽况復此輩反黎庶不勝苦括囊索金銀殺人掠子女元惡幸誅擒所失寧復取治亂如理絲不理將失緒治田當去蠧不去終害黍軍容欲不驚必先肅其旅梁棟欲不傾必先正其礎措置果合宜何憂不得所題王秉彛樂善堂結廬在人世惟善以自將宅兹幽迥地逺彼勢利埸古屋三四間秋風白雲鄉仁慈居壺奧禮義為垣牆庭種三古槐門栽五埀楊芝蘭香四座花蕊映兩廂光輝謝金碧調飾辭鉛黃吟榻青峰邉釣石緑沼旁窗前書萬卷膝上琴一張客至亦不惡茗碗與酒觴客去但髙卧不夢封侯王全無寵辱驚常有聲名香胸中萬念空併此身世忘秪存金石心靡替剛毅腸平生無所短而亦無所長平生不作惡善亦無可揚善惡俱兩遣長短未用量傍人患不足我樂殊未央樂此山水麗樂此松桂芳樂此烟霞古樂此風月良邱園之勝概泉石之膏盲豈止樂吾廬更樂斯民康古今之遺範天地之大綱無一不自樂其樂匪泛常其樂善無盡聊以名此堂聽泉亭枕石聽山泉看雲度流水水去動雲根泉鳴漱石齒神清萬竅風夢破孤舟雨倣佛中郎琴泠泠響焦尾中含太古音分明合宫徵我老兩耳聾無心論臧否世事不願聞髙卧茅屋底今朝偶聽泉爽氣侵骨髓毛髮為灑淅肝膽忽磊磈取泉三咽之頓失平生鄙翩然欲憑虛乘風學輕舉豈意下劣資悟此清净理喜極竟忘言徐徐與泉語慎勿戀空岩寒烟鎖秋渚慎勿伴髙人幽賞無窮已旦夕赴瀛洲奔馳日千里長空捲雪濤聲撼天地裡潜蛟既出逰蒼龍亦驚起恩波萬丈長大洗人間滓豈獨此亭中但滌巢由耳男兒生明世男兒生明世學禮仍學詩禮以知揖讓詩可知盛衰上輔明主聖下救斯民愚坐食萬鍾祿出駕駟馬車否則居巖邱髙卧秋風廬談笑理蓑笠獨釣西江魚戊申嵗間中清賞十景秋江明月艇秋江明月艇月皎光嬋娟老我坐其中蒼顔髮皤然半醉㺯明月赤腳扣兩舷秋風百尺絲獨釣千丈淵不繫吞舟魚寧掣橫海鱣釣斷人間心不為世網牽鼓棹笑歸去月落江底懸烟岫夕陽鐘烟岫夕陽鐘清聲滿寰宇直催海月上山雲亦飛舉老僧定裡回英雄夢中起掃空聲利情洗淨塵垢耳平生剛毅腸聞之屢驚喜疏狂發長嘯起舞不得已遺音尚悠然迥入霄漢裏麗圃橫長笛麗圃橫長笛秋風感慨聲一吹山石裂三㺯波濤縈江空翠蛟泣夜靜蒼龍鳴鶴怨雲巢冷猿啼月嶺明嫠婦悲秋淚孤臣去國情遺音尤激烈髙調轉凄清曲終情未盡目送數峯青修林䇿短笻修林䇿短笻路入烟霞去羣峯喜逢迎向人如嫵媚攀條覽芙蓉臨流採蓀蕊幽花不知名馨香雜芳樹天風吹敝袍曉露沾行履更無塵染衣常有雲生袂山禽忽飛來啼破幽絶處籬邉餐落菊籬邉餐落菊采采黃金英拾之不滿掬松露相和傾三咽清肺腑九竅皆芳馨食之久住世化為天地精不饑復不老顔貌如童嬰驂鸞訪安期跨鶴尋廣成回首謝人世何用千秋名嶺上撫孤松嶺上撫孤松松陰蓋天地霜皮四十圍傲晲人間世老幹帶烟霞虬枝撼風雨𤣥鶴數往還白雲互來去撫松一問之坐閲幾千嵗人夀能幾何松老良未易與松語未終落月寒生袂開徑延馴鶴開徑延馴鶴愛此癯瘦形不與凡鳥伍戞然獨長鳴我性鶴相似寵辱常不驚平生寡交遊閉户鮮送迎松關夜月孤茅屋秋霜清從今與鶴逰騎鶴朝玉京鶴爾幸知此慎勿輕渝盟登樓數去鴻登樓數去鴻目斷江山異帛書望不來愁殺深閨女遺音墮寒空疏影澄秋水凄凉關隴雲慘淡瀟湘雨飛鳴萬里餘為此稻梁計㸃㸃夕陽中陳陳荒烟外天際兩三行飛入蘆花去朗吟黃葉寺朗吟黃葉寺落日長林密天花拂衣香露草沾屨濕深烟銷竒峯間雲褁危石金鐘透太清玉磬穿虛碧境勝龍象遊夜靜虎狼出地逺人踪稀心定塵緣寂仙凡迥不同坐久三嘆息長嘯白雲峯長嘯白雲峰聲清方夜永海月忽飛來光照千巖靜松林奏瑶琴山泉潄金井下與人世違上接星辰近凉露洗心源天風吹鬢影使我凡陋軀泠然發深省願言生羽翰直上青雲頂採蓮歌畫舫緑楊邉吳娃競採蓮紅粧映緑水窈窕誇少年只愁蓮心苦食之味不甜只愁藕絲短織之難成縑相與唱歌去撑破蒼波烟讀書山月下讀書山月下月色流巖扉松風吹毛髮草露沾裳衣研精探𤣥奧竭思窮幽微興亡空感慨今古誰是非孔孟幾千載斯文愈光輝蚩蚩愚下士去此將安歸舉酒春風前舉酒春風前勿訝衰顔紅藉兹麯糵媒成彼醖釀功頓使鐡石腸化為歡恱容喜色浮鬚眉和氣填心胸浩浩六合間廣扇淳厚風兒女豈知此唯醉芳花叢圍棋白日靜圍棋白日靜舉袖清風吹神機衆未識妙著時出竒我老天宇內白雪凝鬚眉坐閲幾輸贏厯觀迭興衰古今豪傑輩謀略正類棋局終一大笑驚起山雲飛舞劍清夜䦨舞劍清夜䦨孤燈耿中堂一舞空奸邪再舞摧豪强頻起為君舞月出雲飛揚氣衝牛斗暗影動蛟龍翔悲風轉蕭颯壯志彌慨慷時哉不我逢石匣深韜藏吹簫明月底吹簫明月底素魄流寒光簫聲更清婉音調美且長孤鸞舞天風老鳳鳴朝陽仙人王子喬往事空茫茫丹成竈應冷仙去臺亦荒千秋更萬古日夕遙相望撫琴白雲端撫琴白雲端聲透巖谷裡山空夜未央長天色如洗喧啾百鳥吟蕭瑟孤舟雨萬壑鳴松風千江瀉流水森嚴肅鬼神恩怨訴兒女人世不爾聞唯入巢由耳漁父曲雨過暮雲收江空凉月出輕蓑獨釣翁一曲秋風笛宿鷺忽驚飛㸃破烟波碧對奕青松邉對奕青松邉松雲濕荷裳棋中有深機淺識未易量知進貴知退能弱還能强爭先合顧後得勝當慮亡輕剽或易失遲重終寡殃將卒勿驕惰士馬須精良能以此衆戰柔者必至剛對酒舞長劍對酒舞長劍劍舞影更長始舞飲一斗迭舞纍百觴舞之不能已飲亦未易量長舞影傞傞長醉志揚揚尚不論公孫况復數項莊年深劍文在曾斬樓蘭王舞罷醉未醒落月流寒光和萬卷閣詩韻倪希聖攜石元吉題萬卷閣詩見示且言其先大父樞密公南渡後嘗讀書逰觀於此南渡去今二百年遂成陳迹感古傷今不能忘懷何時一登樓縱觀前人遺躅朗吟豪詠于天風百尺之上與王粲元龍相望于千載之下顧不偉歟因次韻二章天風百尺樓壯制凌霄漢繞屋山四圍充棟書萬卷峰巒獻竒觀宇宙鍾神算絃歌師魯丘政治資姬旦冥搜竟忘疲幽討庸辭倦唯知扇文風未必圗美宦桂月與松雲時復供清玩人去樓亦空千秋發悲嘆畫棟麗晴霞飛甍接天漢虛櫺納青山巍軒貯黃卷緬懷創樓人胸襟藴竒算相去數百年坐閲成一旦想當讀書日研精固忘倦浮雲變盛時短世驚薄宦我欲登斯樓烟雲聊把玩感慨三撫䦨臨風寄長嘆雨中懷李本存十二韻久雨不出門幽齊抱岑寂㸃檢屋外山白雲為雨濕最苦溪水添沒却釣魚石平生慮事深無故憂得失因念倦逰人荒凉不溫席獨抱瑰竒才雙瞳黑如漆關山一萬里誰能共欣戚故舊半雕零親戚隔存殁亂後幸自强感激彌嘆息蓑笠擬訪之濁酒聊共適酒酣彈鋏歌忘情話疇昔雲深路不通何處尋踪跡幽齊清興窗迎青嶂逺門掩白雲深坐久風生席年髙雪滿簮訪梅臨水際採藥陟烟岑月徑桓伊笛秋庭單父琴驚醒塵土夢滌盡利名心衒世間聲譽生平不用尋故圃梅花身世水雲鄉氷肌玉色裳靈均千載恨和靖一生忙南國遺髙躅東風遞暗香久同松柏撡肯學杏桃粧冷淡孤山月髙寒半夜霜鶴猿常欵狎蜂蝶任猖狂興懷幽遁足嘉謨崇勳授壯夫杖藜登嶺岫蓑笠釣江湖最喜烟霞古從教姓字無頓忘身外慮寧受世間譽盡日尋棋局長年卧酒罏飲酣吟嘯逺睡醒興懷孤秋嶼翔雲鶴春波浴海鳬四時花木美野叟復何圗東籬丙辰季秋作曳杖東籬下層巒列環岫南山如有情青翠俯相就松桂二老蒼烟霏乍無有孤雲屢出竒羣峰競呈秀圗彩寫晴嵐琴音潄寒溜采采黃金英芳香滿衣袖新月新月如佳人娉婷特姝麗雲端露蛾眉丰標迥然異輝彩雖未盈已足破昏翳但願早團圎神光耀寰宇從兹億萬年長照人間世秋懷次童中州韻四首拭目看秋雲洗耳聽秋雨晴刈東皋禾冷衣南山苧長安名利途屏跡不吾與惟有金華峰相看淡無語長空好明月燦爛今夕晴萬里皆月色四顧無人聲徘徊下青松照我茅屋明我望長嘆息悠然萬感生取杯挹青光和此松露傾咽之清肺腑快我平生情沈郎江左人聲名驚宇宙秋風百尺樓寄傲腰圍瘦惜哉清廟器未展經綸手斯道日已亡斯人焉可友唯應雙溪月清光屢相就桂魄延秋景松飈生夕凉良宵兩相值蕭瑟流清光風聲驚客鬢月影照我床徊徨不成寐轉覺嵗月長起坐問風月而我誰老蒼風靜月不言耿耿天中央三月望夕玩月長空蟾吐魄良夜何團團皎如青銅鏡燦比白玉盤試浴海波底飛上青楓端徘徊嵩岱間宇宙生清寒神光常不泯留作千載看南山晚眺南山青如藍處士衣可染獨立萬仞岡眼空天地逺扶笻訪梅竹褰裳躡苔蘚靜聽水潺湲卧看雲舒卷長嘯撫孤松乘間數竒巘平生不動心肯隨名利轉摩挲太古石相知諒非淺古意濁醪有佳趣不結醒者歡素琴有竒指不為俗耳彈真樂存妙理流水環髙山知味諒不多知音良獨難樵雲獨唱卷一
