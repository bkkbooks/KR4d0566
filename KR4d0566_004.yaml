body:
  text: 樵雲獨唱巻四元葉顒撰絶句題時苗留犢圗二首秩滿言歸父老憂臨岐分犢較蠅頭男兒利物忘天下未必區區在一牛留犢歸牛駭見聞古今唯數一時君設令買寵生賢嗣未必邦人敢見分示小兒阿真牡丹二首荼䕷春暮各一首絳色羅裳緑色襦沈香亭北理腰肢含風笑日驕無力恰似楊妃睡起時淺紅深紫間輕黄天下無花敢比芳素與東君同富貴肻隨凡品擅稱王一㸃檀心氣味長向人無語舞霓裳千紅萬紫消磨盡猶有風吹不斷香老紅新緑駐烟波無奈青皇促駕何又是一年春事了杜鵑聲裏夕陽多晚步偶隨芳草踏斜暉石徑雲深翠滴衣兩袖天風明月上杖頭挑得樹隂歸秋夜看月廣寒宫闕桂香浮萬里無雲獨倚樓明月滿空天似水西風吹斷海門秋次韻周安道憲史仲春雨窓書懐十首繰烟楊栁千絲綠過雨薔薇萬㸃紅詩句滿前唫未穏好懐寫在夕陽中深院梨花呈膩粉鄰墻艶杏褪殘脂池塘雨後蛙聲閙半為官鳴半為私茶鼎松濤翻細浪桃溪花雨湧香泉旋尋笋蕨春山下不枉江南二月天緩騎黄犢隨芳草閑倩蒼頭掃落花醉後不知新過雨巖前應濕舊烟霞破除愁悶無過酒消遣情懐正要詩燕子未来春又半一簾花雨海棠時長笑陳搏争似睡深非杜宇不如歸男兒正要成功業拭目江山看落暉愁来倍覺詩難和醉後寜辭酒滿斟夜雨驚醒塵世夢春風吹老少年心一春憔悴未曾晴况是簷聲入枕鳴却恠夜来詩夢好草塘雨過月初明凝烟芳草入疎簾過雨閑花㸃澗泉正是清明時節近鷓鴣啼過夕陽天蝶懶鶯慵燕語衰紅羞緑怨濕難開晴窓悮聽山禽樂又是鳴鳩喚雨来用前韻序山家幽寂之趣呈前人十首夕陽香徑逐東風瘦䇿輕扶數落紅信步偶隨流水去不知身到白雲中棠梨睡起嬌啼粉桃杏香濃淺抹脂自是從来肌骨好春風寜為一花私滿盛煮茗春波月旋汲澆花石澗泉客至不妨頻勸酒醉開白眼看青天春風緑盡江南草夜雨紅銷樹底花獨立斜陽多少恨長空捲散暮天霞興来浩飲淵明酒醉後豪吟太白詩獨坐獨行芳草地半晴半雨落花時閑中採藥雲邉去倦後扶笻花下歸㡬度吹簫陪好月數畨横笛送斜暉蜂蝶漸慵春漸老詩辭頻和酒頻斟年来深識山中趣老去全無世上心雲舒山色千峰秀雨過蛙聲兩部鳴多謝知心峰頂月夜深常到寢床明摳衣穏坐栖雲石洗耳閑聽潄竹泉夜半有時長見月人間無夢去朝天一任猿驚野鶴猜老懐笑口要頻開髙眠蕙帳春風暖不怕雷聲入枕来人或問予雲􅨉舊隠尚無恙者賦一絶答之瘦竹長松小徑花故園泉石鎻烟霞白雲無恙青松老依舊山中宰相家贈畫史王玉峰百頃風烟生晝寒萬山重叠起豪端前身莫是王摩詰畫出娥眉擁翠鬟題王夀卿烟雲叠嶂圗斷岫平山㸃畫粗嵐光濃淡有如無何時直到羣峰頂萬叠雲烟一老夫贈寫真張小峰二首飽厯風霜骨格粗老来漸覺髪毛枯形容妍醜從君畫畫得平生執抝無古貌清如雪後松吟肩瘦似雨餘峰莫將山上畊雲叟錯擬巖前板築翁登樓聞笛有感笛聲吹起白雲秋兩袖天風獨倚樓北望中原何處是落霞孤鶩古今愁一聲長笛夕陽樓總是闗山舊日愁杳杳山青雲盡處澹烟衰草不勝秋題赤壁圗曹公智計世無雙席捲南来孰敢當濁浪翻江迷赤壁誰知猶有一周郎讀宋紀顯徳衰㣲國祚遷兒孤母寡足堪憐如何宋主迎闕和李本存孤字韻夕陽山塞笛聲孤半醉轅門語笑粗舊日讀書蕭寺月夜深曾到帳前無瘦聳吟肩野鶴孤衣冠山野禮容粗政慚聲譽非君比却喜功名入夢無月冷霜寒老將孤北風吹雪勢還粗方今四海皆元濟未信忠剛李愬無清比梅花帶雪孤吟腰瘦減十圍粗約君浄掃南山石共坐雲邉話有無老首頻搔鬢影孤惜無三尺斬頑粗何當畧借天風便為掃妖氛半㸃無孫劉何苦各稱孤想是當年計畫粗若使盡忠扶漢祚坐觀曹魏眼中無春初即事怕寒猶自怯羅裳嫩栁偷春淺試黄青草已生詩未就阿連無夢繞池塘李本存疊有和章再和孤字韻二首撚鬚索句興懐孤信手圍棋著數粗病酒風情愁後減惜花春夢老来無新詩清侣玉蟾孤意度安閑細不粗島瘦郊寒元白俗開元之後晚唐無題李克明翁媪起家圗二首一翁以指就醋瓮内取醯吮之嘗其味之美惡一媪持星火吹燈備諸窮態阿婆吹火燄光寒老叟嘗醯氣味酸後代兒孫寜識此髙燒銀燭照杯盤小甕吮醯酸透骨寒缸吹熖火燒眉何時翁媪花燈下珠翠成行捧玉巵題静齋手巻雲凝不動青山老花落無聲白晝閑松影半窓清睡醒卧看流水夕陽間丙申大旱呈時官二首雷久無聲電歛光老龍何地宻韜藏只愁遂失蒼生望何不留心濟四方自夏經秋百日晴更兼無處不戈兵千疇萬畝乾枯盡留得衰荷聽雨聲冬夜梅邉即事羅浮山下白雲深一枕師雄夢未成殘雪初消明月上東風吹徹玉簫聲冬夜聞笛出入韻午夜誰將玉笛吹白雲滿地濕難飛驚囘一枕春風夢月上花梢最好枝初夕暑退生凉溽暑初收生暮凉風將秋信入虚堂芙蓉峰頂夜来雨溪水新添二尺強霜天曉角耿耿星河曙欲流角聲悲壯起層樓滿空明月青霜重人與梅花一様愁梅花分韻得詩字木萼霜葩帶雪枝月中香影最清竒林逋去後東坡死近日江南未有詩讀宋徽宗北狩龍沙賦忍聽羌笛吹落梅花樂府一聲羌笛咽龍沙萬里燕雲獨夢家吹入中原都是恨如何只怕落梅花春日午窓睡起日移花影轉簾西風撼松隂落研池好鳥不鳴芳晝寂午窓清夢醒来時題石勒㕘佛圗澄手巻六首石勒亡宗怨季龍虎於冉閔恨何窮佛圗果有仙人見盍把深機悟二公劉曜成擒一語中漚麻老秃亦英雄可憐只辦平常事忘却中原逐鹿功何須傾意扣圗澄眼見狂劉一鼔擒絶勝漚麻池水上老拳毒手日相尋推恩忘怨漚麻池便是劉郎就縛時成敗當年人盡識未應惟有一僧知擒劉竒策筭無遺石氏存亡必已知三十六孫同日死佛圗何不預言之東門倚嘯聲音逺西域㕘陪禮義專折節李陽吾未論並驅光武孰先鞭春雨晚霽東風吹雨作絲輕駕勒餘寒放晚晴滿地濕雲收未盡一簾花影不分明幽齊夜坐效山人體一邱一壑白雲深一笛秋風一曲琴夜半一牕明月色一杯松露洗予心晚酌山家即事濁醪初熟正鷄肥野老衝烟跨犢歸漉酒烹雞成小酌醉眠忘却脫蓑衣贈山翁二首草廬深寄夕陽村世路榮枯久不聞二畝石田畊墾罷又騎黄犢入雲深古貌虬髯鶴髪翁醉吹長笛卧髙峰不知胷次藏何物鼓舞春風宇宙中西子捧心圗員也捐軀死諌君越王嘗膽恨尤深西施亦解憂人國盡日攅眉痛捧心讀荆軻傳壯士西逰遂不還英雄千古笑燕丹至今幽薊秋風道依舊蕭蕭易水寒磻溪釣圗二首渭水風生兩鬢秋平生意在釣吞舟如何八百封侯國也逐鯨魚競上鈎白髪荒凉釣渭濵宅心非是為金鱗不知絲線長多少牽掣江山八百春題伍子胥傳後子胥忠孝兩難偕破楚鞭君謝父奢何事危言强諌日死無賢嗣撻夫差題三傑蕭何二首匹馬追亡古道傍便知韓信世無雙築壇不用蕭侯語垓下焉能滅楚王獨收相府舊圗書形勢髙低盡得知鎮撫闗中成帝業沛公馬上豈能為韓信劉項存亡指顧中君臣未定各稱雄早知鳥盡弓無用未必殷勤謝蒯通張良一擊秦車水逆流當年銳志復韓讐偶因天地風雲合扶立炎劉四百秋冬景十絶李從道麗澤詩社出題至治己未至己亥四十年矣鷺立寒江青苔白石魚鱗腥盡日獨拳寒雨汀疑是晴江沙上雪黄昏一㸃不分明寒江獨釣扁舟獨釣烟茫茫醉著蓑衣不耐霜最是月明無伴侣一聲漁笛出滄浪霜天曉角城上征人吹角聲月寒霜重聲㝠㝠孤舟萬里南遷客起著衣裳帶夢聽江路梅香漠漠江雲路不分小橋流水夕陽村唫翁馬上頻囘首一陣東風暗斷魂板橋霜曉月中青女下瑶空㶑灔寒波跨玉龍畫角一聲天未曉前村梅下有吟翁茅簷曝背門外三竿紅日遲向陽花木暫熈熈老翁曝背亭前坐自取經書教小兒書舍寒燈青燈黄巻伴更長花落銀缸午夜香異日長檠珠翠裡苦心寒燄莫相忘梅下清吟吟肩瘦聳白雲根興遶孤山水竹村月上南枝詩未就暗香疎影又黄昏紙帳梅花銷金帳暖酒盈觴醒後依前世慮長何似白雲深處卧春風一枕夢魂香烟蓑釣雪萬頃玻璃失釣磯白雲片片補蓑衣鳥聲斷絶人蹤滅獨向蘆花月下歸唐武則天傳天人共憤世皆嫌埀拱焉能二十年誰信裙釵珠翠侣反勝冠冕任英賢闕爆竹二首一聲爆竹透雲端驚醒蒼生睡不安若使江淮豪傑聽定應慚悚膽先寒非嘗聲響聒天来鼔動陽春海上囘偶爾驚人還寂寂情知不是武侯雷丁酉仲冬即景雪水煎茶枯枝旋拾帶氷燒雪水茶香滚夜濤黨氏豈知風韻美向人猶說飲羊羔地爐煨芋地爐煨芋足充饑凉薄家聲勝富兒李宻懶殘風味在寒灰冷火澹相知雲巢鶴睡烟梢深處穏栖翎標格孤髙逈出羣只恐聽琴驚夢醒踏翻松頂一巢雲月嶺猿啼樹頭清嘯兩三聲紙帳梅花睡欲成喚醒冷泉亭上夢嶺雲飛動月初明玉樓吹笛天風吹笛落天涯萬瓦霜清月影斜驚醒覊人猶自可江城只怕落梅花梅屋彈琴琴張甌茗伴爐薰三㺯梅花月下庭香影孤髙音調古空堦誰許鶴来聽衝寒貰酒擁被酸吟雪未晴拾樵路斷閉松扃相如病渇誰来管自整衝寒貰酒缾踏雪尋梅雲碍前村路不通暗香疎影杳無蹤瓊琚踏碎知何處月上孤山第一峰梅梢月落斗轉參横午漏遲一輪寒魄堕南枝玉簫吹徹青霜冷正是詩人夢破時松徑雲深數片和烟褁石苔空林長惹鶴猿猜天風吹度長松下僮子殷勤掃不開雪夜乗舟月色波光共一溪水天上下漾玻璃孤舟蓑笠清如許何必山陰訪戴逵霜晨覔句霜月凌凌獨凭䦨推敲未定怯衣單眼前佳句無人識詩比梅花瘦一般枯木寒鴉老樹經霜帶夕暉十圍横跨小橋西羣鴉不怕雲巢冷夜夜黄昬来上啼孤松老鶴城郭依前嵗月非巢空雲冷影相依長松月落天風逺時向青山盡處飛書窓梅影疎花冷蕊映書窓勾引逋仙蝶夢狂縱使春風吹散後又隨霜月上書囊石鼎茶聲青山茅屋白雲中汲水煎茶火正紅十載不聞塵世事飽聽石鼎煮松風尋梅二首石根巖畔與山隂瘦馬羸僮到處尋流水溪橋沙路逺何愁雲宻更林深落日孤村石徑斜挨雲深入野人家小溪流水春風暖恐有枝頭半吐花松徑清逰驢載新詩僕抱琴白雲幽徑夕陽林天風十里青松頂滿耳笙簫太古音梅影二首寒蜂凍蝶謾驚猜積案春風撥不開霜月滿窓詩夢醒更無一㸃暗香来夜深隨月上紗牕粧㸃西湖處士房驚醒一床胡蝶夢春風冷落淡無香贈相士二首貌古如松卧壑秋虬髯鶴髪炯雙眸衰顔未用煩公相自許書生老不侯虎視陰陽膽氣粗平生事業遂雄圗不知侃侃怡怡輩也入先生相法無秋日南樓晚霽即景夢破虚堂生暮愁晚雲將雨過南樓西風掃净長空翳畱得天邉桂子秋讀秦始皇紀衡石稽程了萬幾日斜猶未下丹墀廵南築北闗防盡禍起蕭牆却不知春雪粧㸃瓊英上玉梢懣人春雪遍芳郊情知不是豐年瑞贏得長安酒價髙清明有感落花庭院晚風輕芳草池塘夜雨晴獨步獨吟消白日閑愁閑悶過清明得耳聾疾戱呈無聞聰老曉枕不聞喧澗瀑夜窓寜聽響松風雖然未遇馬師喝也勝前人三日聾題卞和泣玉圗手巻二首一獻無功便合休殷勤三獻欲何求至今寒璞荆山下月色蒼蒼萬古秋忍把連城價放低臨刑刖足未心灰丈夫自古慙輕獻女子從来恥自媒懐赤松雲􅨉舊隠白雲青巘是吾家門外長松樹樹花身在異鄊歸未得夢中猶賞舊烟霞月夜萬片白雲歸岫後一輪明月到天時乾坤清氣無人識借得樵夫短笛吹題雪巖畫倒蘭黄瑨卿題云嫋嫋春風一様吹托根髙處欲何為從渠自作顛倒想終有懸崖撒手時瑨卿舉進士厯官至行省左丞乞身歸私第幅巾布衣澹如也予喜賦一絶于其後托根孤峻極尊崇俯視羣芳迥不同到底謙恭隠君子何曾仰面笑春風夢故友清玉泉首座飄零湖海昔年僧握手論心久未能夢裡匆匆忽相覩解言雲屋共青燈月中仙女驂鸞圗雲邉仙女夜驂鸞月下霓裳舞袖寛吹徹紫簫風露下玉容𤣥髪不勝寒樵雲獨唱巻四
