body:
  text: 樵雲獨唱巻六元葉顒撰律詩重九後菊壬辰年小籬黄菊節後始華異香芳容不類餘者惜其開不應時如絶筆之麟又似吾性倔强好與世欲背馳豈其以予無酒酬酢故遲之抑將恥伍凡下不欲與之同出俟其衰謝然後獨步西風否則賦性謙退不欲争先羣品特殿於九日之後耳賦唐律一章見意云癡蝶狂蜂未用疑從来根性懶趨時情知不少争先軰故遣遲開殿後枝斜日園林方冷淡西風天地特清竒芳苞小蘂秋香老不是淵明斷不知題友琴堂疇昔知音托久要同聲相和更同條嗟予無用頭甘秃顧子多材尾亦焦七尺身長形固美兩翁調古腹空枵何當共坐虚簷下握手論心到月髙山館酒邉即事和何仙翁韻但須獨酌杯中酒何用千秋身後名才拙更無醫國伎家貧猶有讀書聲岩花落樹香雲影庭竹迎秋伴月明醉坐石床横短笛天風吹斷世間情登八詠樓我是東陽老布衣沈腰銷瘦勝當時非常胸次能無酒如許江山政要詩今古可驚渾似夢英雄未死恰如棋齊梁耆舊俱塵土落日荒城草木悲題余仲楊松雲齋手巻二首白雲来往青松頂樹老雲寒嵗月深雲去人間化甘澤松留天地作清隂孤標素有衝霄氣髙躅曾無出岫心已喜巻舒皆在我何妨偃蹇卧豐林幽人住在松雲下雲白松青十里程揀得好枝延鶴宿掃開輕翳放蟾明栖巖枕石衣裳冷倚樹吟詩格調清早晚移家近君屋飽看烟靄聽濤聲次衛律本憲史紅梅韻本是孤山雪裏花朱唇得酒改容華貪勻南國佳人面忘却西湖處士家一種暗香凝夜月十分嬌韻醉時霞鄰牆艶杏誠非伍須信南人語未差復次前人緑萼梅韻老免舂香細搗霜更添藍澱越風光喚回庾嶺春風夢染出羅浮月夜芳日暮氷魂啼翠袖雪殘𤣥鬢舞霓裳近来姑射梳粧别説與林逋合斷腸送東陽吴縣尹東陽有玉山東陽天下佳山水君到其中地益靈恩惠有如銀浪濶姓名髙並玉峰清桃香春暖逰蜂喜琴調秋髙老鶴聴父老新鐫去思石白雲来往䕶碑亭題王夀卿烟雲疊嶂圗青峰盡處更青峰爛墨淋漓慘澹容雲褁長松三百尺烟迷荒嶠十千重層巒岌嶪如棋布空翠清寒勝酒濃添冩詩翁嵐影裏羽衣霧縠駕天風題幽居隔溪春色兩三花近水樓臺四五家濁酒不妨留客醉好山長是被雲遮松根净掃彈琴石栁下常維釣月艖路狭不容車馬到只騎黄犢訪烟霞乙未八月二十二夜夢宿山寺與僧講道論詩不覺夜分僧賦一聫云鶴向白雲棲處宿僧從青嶂影邉歸覺而㣲改其句足成一律云天風吹夢過招提瘦策迢迢扣夕扉鶴㨂白雲枝上宿僧從青嶂月邉歸杉松韵古調清樂苔蘚痕深染敝衣多謝山靈能念舊此心焉敢忘烟霏二月江城見梅二首二月江城第一枝怕寒故故著花遲不嫌艶杏夭桃俗甘受狂蜂妬蝶疑月落西湖驚舊夢雪消南國憶當時樓頭亦有霜天角懶對春風暖日吹桃杏紛紛正得時疎梅髙潔合知㡬如何萬卉嬌春日猶有孤芳駐夕暉未要板橋尋蠟屐最宜沙路試羅衣輕鞋小扇孤山下絶勝逋仙踏雪歸秋齋雨後月出即事雨後虚堂清夢長不堪風露襲荷裳濕雲散去山容瘦新月飛来海氣凉丹桂生香秋兔老青松舞影莫蛟翔騷翁不管茅齋冷滿挹蟾光入酒觴送李本存歸江西新喻州本存儒學敎授歴省掾為御史所論改温州海隅廵尉賦三律贈之又攜書劍過江西長鋏三彈一振衣風景不殊人自老江山有異鶴空歸閑雲仍舊封吟榻流水依前䕶釣磯去去鄊闗莫回顧春風吹老故園薇獻賦論兵計已疎扁舟歸去意何如豈無醫國三年艾空讀傳家萬巻書處世固當同鳳鳥還鄊端不為鱸魚故園泉石應無恙依舊青山帶月鉏去就輕於出嶺僧烟包挑月一枝藤十年湖海孤篷雨萬里闗山半夜燈後進衣冠皆有用先生才調獨無能送君歸洗征塵浄髙歩雲岑頂上層彼州有山名雲岑頂春日雙溪晚歸萬頃晴波蘸夕暉泠泠寒碧浸漁磯水流不盡隨雲去潮落無聲帶月歸桃岸春深紅作陣蓉峰烟暖翠成圍江山風景能如許可是休文解賦詩懐湖山隠者并序湖山隠者不知何許人往来湖山間麻衣草履竹策紅巾問其姓名則笑而不答蹤跡似詭異而辭情慷慨神思清逺未易量者寡結交少許可性不喜譽人亦不沽譽於人也嘗與人談論古今斟酌時事一言不相合引而去之不復回顧近不知所之云湖海無求放逸人不將清夢出邱林喜吹異代秋風笛解鼓空山夜月琴驚嘆時危如有意貪眠雲暖又無心邇来蹤跡難尋覔髙卧岑巒萬疊深和李本存見寄和周府判感時遣懐韻二律家山無恙尚如新忍著征衫染世塵功業謾彈三尺劍琴書空老百年身黄金散盡頻添恨白髪閑梳政慘神斯道未亡公論在老翁未必久沈淪世態紛更幾度新笑看馬首沒黄塵幸無寵辱驚清夢喜有林泉慰老身雨後溪光尤㶑灔雲舒山色越精神年来深得歸耕計甘學愚䝉但隠淪述懐三首用前韻寄本存照眼竒峰朶朶新荷衣雖破喜無塵莫嫌甕牖難容膝也勝儒冠解悮身好飲㸃頭呼酒侣不貪拍手罵錢神山中清賞無窮盡忘却髙翔與下淪貌古何妨語笑新寜憂勲業鏡生塵芙蓉露下三更月葡蔔風前七尺身偶爾忘懐非造理或然閉目獨凝神老身疎懶無迎送髙卧從人話隠淪乾坤清氣四時新獨倚天風絶㸃塵白酒最能開笑口青山儘好著閑身松根對奕棋無敵柿葉題詩筆有神幸有世間真樂在貪夫何苦嘆湮淪謝姜明徳學錄見醫膏肓痼疾二首少年曾讀活人書壯嵗能為死馬醫學究岐黄惟我許術㕘盧扁少人知鼎中九轉丹埀就肘後千金世莫窺舊有烟霞泉石痼飲君一七頓成詩偶然竒疢在膏肓謝子慇懃數送方豈但獨除前日苦更能頓歇晚年狂雲邉丹杏香方美世上黄粱夢正長時事轉艱吾鮮樂取餐芝术訪仙鄊次李本存宦逰困滯韻天風吹落海門槎一片歸心未到家空羨青衫縈紫綬長驚白髪岸烏紗當年鳴鳳曾栖竹近日飛蠅遽集𤓰時世輕浮君已識不須多笑子陽蛙再次前韻二律喜其寄傲僧廬深得幽寂之趣健理烟波釣月槎困眠雲屋野僧家清談自足酬𤣥㫖佳句仍堪罩碧紗蕭寺借栽陶令菊祗園分種邵平瓜翻經石上琴彈罷最喜良宵兩部蛙少日心存漢使槎老年詩到晚唐家床前古鼎烹茶灶頭上凉巾漉酒紗繞屋鋤雲多種竹鑿池分溜廣澆瓜空庭草色休頻剪留䕶堦除鼔吹蛙復次前韻述懐寄前人二首匕尺長軀卧老槎白雲飛處是吾家虚牕竹影侵琴榻石鼎茶香襲帽紗北闕無書難獻䇿東門有地易栽瓜秋風半世空山夢驚醒池塘月夜蛙身似江湖不繫槎青山是處儘堪家手揮雲翰千畨紙鬢裡霜髦一幅紗時事固然輕土苴吾年哀矣嘆匏瓜何當脫屣人間世不雜喧譁井底蛙擬挽唐思仁芹老香寒泮水流生平琴劍兩悠悠讀書不辨黄金印作記空登白玉樓吟骨已隨霜月冷詩魂長伴莫雲秋恱齋文墨傳家業分付孫郎地下脩再次槎字韻述懐形容枯似飽霜槎身老空山處士家一徑梅香雲滿地半窓花影月籠紗常穿謝氏登山屐慣設孫郎餉客瓜離亂固非疇昔比池塘難得為官蛙讀金中孚詩珠玉篇章語不凡宋唐佳句晉清談雲分霞彩流銀漢月借波光下石潭老鶴唳霜棲未穏孤鸞對鏡舞初酣直從瘦島推敲後今度詩人數二三再次前韻予與其父舊識詩中故及之乃父仙㳺竟隔凡不圗老共阿戎譚千年白璧沈滄海一顆驪珠耀碧潭羣彦進趋心正渇獨君髙卧睡方酣幽懐亦笑狙狂者唯數朝三與暮三喜余仲楊陪樞掾俞公芳催兵海道嵗晚逺歸羽檄催軍嵗晚歸海南消息定何如腰邉雖少封侯印囊底應多盪冦書越水閩山牽舊夢蠻烟瘴雨襲輕車短衣匹馬男兒事莫戀邱園月下鋤王𢎞道下訪别去十年矣至正戊戌遷淛東憲史相見如夢寐論心話舊不覺憮然賦二律見意云白髮相逢兩故人共談時事欲霑襟老来喜有歸耕樂亂後慙無濟世心常説文章非事業深知書劍悮冠簮如今得似終南叟萬叠青山一曲琴詩酒分違各一天相逢鬢雪笑埀肩自慙衰貌非前日猶喜清談勝昔年閲世只堪三嘆耳論心幾欲一澘然何時吟騎重来訪夜雨清燈對榻眠𢎞道見和復次前韻羨君詩格類唐人胷次氷霜月一襟句律老成前輩語衣冠新様昔賢心豈無青眼觀良璞争奈黄塵襲敝簮早晚南山坐雲石邀君来聽絶絃琴自許餘生不問天樵夫漁叟得齊肩豈期􅤯鼔轟天日猶有篇詩慰暮年白髪滿頭驚老矣黄金擲地喜鏗然襪才敢共元龍並何但髙樓上下眠再次前韻凡三疊覿面依然舊日人祗添塵土上衣襟聫床夜雨思前話十載春風老壯心松徑任敎雲滿袖宦途莫遣雪盈簮山家活計還知否詩巻茶缾夜月琴車馬重逢喜二天詩翁仍舊聳吟肩風塵有恨彫雙鬢嵗月無情老十年紙上虚名俱夢爾杯中真樂出天然别来學得安心法净掃青山枕石眠慮逺憂深感慨人出竒籌䇿滿胷襟抑强扶弱平生志激濁揚清舊日心思向明時呈利器肯隨漓俗著塵簮秋風異國無人夜獨鼔空山月下琴林泉深處不朝天野服裁雲補兩肩閉户讀書頻謝客入山採藥動逾年松根長嘯心清甚石上豪吟興浩然盡日更無身外事困尋芳草落花眠江左風流絶代人雲裳蘭佩更風襟政多感物傷時恨常負憂君為國心三獻無功羞抱璞十年不調欲投簮酒酣㧞劍空長舞誰識中郎㸑下琴醉吹長笛夕陽天醒拍希夷魏野肩岩下烟霞常滿地世間榮寵不多年採山釣水常隨分賞月吟風得自然松頂日髙三十丈老猿猶抱白雲眠用前韻寄李本存二首浮雲常是蔽青天黎庶何由擔弛肩鄊社音塵空入夢干戈休息果何年石邉清坐真閑者世上狂圗不坦然安得中山千日酒與君長醉日髙眠獨憐湖海倦逰人忍泣牛衣淚洒襟經史沈酣千載志功名辜負半生心空驚繫肘黄金印徒羨峨冠碧玉簮何似麻衣破紗㡌石床雲屋理瑶琴至正己丑端午日感懐寄輝東陽一詩至戊戌重午又十年矣王𢎞道見而和之其語句俊爽清健復次韻美之竒如霄漢舞天吳壯似英雄敵萬夫錦繡心腸人未識林泉胷次世應無久空蕙帳秋猿怨近宿芹堂夜鶴孤况是東南重午節湘江烟暝楚雲疎時𢎞道寓金華學舍次李本存端午見寄韻二首功名驚世久無圗泉石膏肓癖在吾滿眼干戈方爛漫繞園蘭艾亦荒蕪蒲觴未飲心先醉松徑長吟興不孤賴有故人知我意肯同阮籍哭窮途獨醒孤坐與誰同懶把哀顔換酒容素負嵗寒齊檜栢不將春色悮芙蓉堂堂陣美誰能犯整整師嚴孰敢衝萬里白雲風捲盡蟾光飛上楚烟峰再和前韻天下闗山入戰圗異鄊為客倍愁吾江淮逺近連烽火里巷髙低長草蕪堅卧謾愁兵甲滿獨醒寜怕夢魂孤太平氣象猶如舊痛飲蒲觴醉道途今年端午去年同老去閑身轉不容幾欲入山穿薜茘常思浮海採芙蓉傷時倍覺愁膓結罵賊徒添怒髪衝何日果能忘世事楚雲湘雨小孤峰至正壬辰癸巳以来方國􅈿輩起天下遂大亂時士民皆登城禦敵馬敎授輩於窩鋪中闕至正戊戌九日感懐賦吴楓初冷水痕収塞雁南飛渡逺洲嵗月無情天地老江山不盡古今愁黄華謾引杯中物白髪空驚鏡裡秋却笑桓温清醼後終然無夢到神州謾多憂思繞東籬舉目江山異昔時落日邉城悲鼓角西風天地動旌旗荒村亂後愁無酒野老胸中喜有詩風景不同人事别菊花何必上寒枝門掩冬籬處士家毎逢佳節惜年華黄花有恨驚秋老白髪無情對日斜杜牧仙逰詩寡和王𢎞人去酒須賖烏紗醉褁西風冷千古令人憶孟嘉誰復攜壺上翠㣲干戈爛漫酒尊稀西風細雨黄花瘦衰草荒烟白鴈飛落日有時懐故國舊居無主鎻空扉龍山囘首尤非昔長使英雄淚滿衣晚對南山飲濁醪少舒幽憤醉醄醄雲邉黄菊紉芳佩世上紅塵襲敝袍陶令官閑身尚健孟嘉㡌落趣殊髙登臨我亦秋風客虚負人呼一世豪雲鎖當年落㡌臺滿山黄菊為誰開久無異士髙人識長有狂蜂妬蝶猜斜日東籬增感慨西風南國正塵埃如何得似承平舊與客攜壺共酒杯慵整東籬貰酒缾白衣望斷夕陽亭征鴻北度烟塵冷戰馬南嘶草木腥嫩菊半開香未老竒峰相對眼終青何當得與淵明約共醉秋風不願醒風急登髙野客傷悲笳聲裏過重陽正須擊劍論孤憤何暇攜壺舉一觴白骨不埋新戰恨黄花空發舊枝香寒烟冷日東籬下西望柴桑路更長悠悠江影鴈南飛黄菊飄香蝶滿枝斜日西風彭澤酒殊方異國杜陵詩烟巒慘澹山林暮霜葉瀟疎草木悲醉後不思時節異半欹烏㡌任風吹滿城風雨晚凄凄城北城南盡戰車無藥可能醫世亂有錢常欲買山居床頭小甕開新釀屋底明窓讀古書園菊豈知吾輩意清香唯解繞茆廬時論田畝輸銀賦二律俾主事者知之固守金湯動萬全使君才調亦堪憐活人隂徳誰能見濟物竒功已得專廣鑄精金酬健者泛科寒士豈當然犒師勞將吾民職争奈饑無買米錢劍不潜鋒嵗未豐帶牛佩犢走西東誰憐耕墾三時力不直干戈一掃空破屋饑人啼夜雨荒村寃鬼哭秋風有司科歛仍如舊願霽霆威畧見容軍中一彦士少好讀書喜談論文章工拙尤篤意詩學求指南於僕為賦一律以贈之知公雅志喜文章光燄須觀萬丈長太傅辭華宜鑒别翰林豪放不尋常筆端妙語誠須識馬上竒功慎勿忘正是英雄馳騁日策勲麟閣姓名香草堂寺有懐東陽輝老蕭寺荒凉繞翠屏髙僧無復定詩盟雨侵深徑苔花冷風度浮雲栁絮輕岩下古碑遺舊跡亭前流水訴新聲昔年髙座譚經地夜夜虚堂貯月明莫春逰赤松桃源春晚落花深仙子乗鸞去莫尋地僻惟聞猿嘯月巖空無復鶴聴琴雲遮不斷青山色風送還来翠竹隂欲上丹山訪遺跡竈寒烟冷碧苔侵牧羊人去杳無蹤欲訪仙鄊路不通樓殿勢穿雲影裡笙簫盡斷月明中嵐光㸃㸃流空翠春色重重駐老紅日莫桃源重回首夕陽香徑鎖春風庚子端午次潘明舉韻二律世亂飄零席未温香蒲何暇薦芳尊傷時倍覺孤難立訪舊空驚半不存燦燦火榴明照眼離離烟草暗銷魂賜衣恩寵承平舊今日干戈未暇論内家端午賜新衣萬姓千官樂盛時榴火噴人初霽雨蒲觴醉客競題詩前歡過眼如流水近事驚心類奕棋今日亂離非昔比澹烟哀艾不勝悲次潘鵬舉喜雨韻二律海若馮夷盡効誠阿香㢲二更多情電驅鐵騎穿雲出水决銀河半夜傾宇宙已清天下勢桔橰無復月中聲冰肌玉骨凉如許何但倉儲喜滿贏蒼龍將雨出山来天為生靈息禍災甘澤既能隨願足片雲未必為詩催稻畦已溢平疇水蕙帳仍轟動地雷剰欲搆亭題誌喜只疑人怪老坡才再和来字韻風倦長坡化雨来洗空塵世弭天災滂沱足使坤維溢澒洞仍煩㢲二催足下已深三尺水耳邉何止一聲雷縣官滿貯豐年粟廣育山林茂異才幽懐不染纎塵六十年夢魂長是寄林泉閑拖竹杖雲邉坐醉脫蓑衣石上眠澗水煮茶和月汲地爐収葉帶霜然平生湖海知心少惟結山猿野鶴縁庚子雪中十二律跨鶴仙人下太空散花天女盡嬪從氷輪玉輦三千里羽葢銀屏十萬重海上有山皆霧鑰人間無屋不雲封凌寒直上岑巒望月到芙蓉第幾峰滕六裁雲舞玉京馮夷剪水出滄溟旋脩江路尋梅屐自挈溪橋貰酒缾只恐雲山頭早白終輸寒士眼長青十年不作淮西夢世事於今未用聽擁被清吟興不窮地爐烟暖火初紅移舟訪戴心應懶入蔡平淮夢已空栁絮影髙迷夜月琪花香减怨春風鬢毛如蝟蓬牕下僵卧誰能識此翁梨雲梅月苦紛紜凍蝶寒蜂錯認春逺近江山皆種玉東南天地正飛塵烟蓑埀釣風標逺石鼎煎茶氣味新幸有千年佳趣在老翁清賞未全貧玉樹瓊林一夜榮悮將春色惱芳情空花發艶無真實凍樹飄綿不老成徒使醉翁增酒價且尋吟社定詩盟劉又去後無佳句羞覩寒光伴月清萬頃銀波細剪裁繽紛飛下玉樓臺初疑羽斾空中舉猶想霓裳月下来風𦂳有花飄岸栁雲深無樹認江梅地爐煮茗松濤響絶勝羊羔飲酒杯朶朶瓊花冷映扉隨風飛舞撲人衣孤舟蓑笠添清興萬里江山失翠㣲醉裏不知明月上望中惟見濕雲飛袁生紙帳方眠穏夢破人間萬事非雲壓溪橋失舊蹤出門迷路酒缾空江山未易分髙下玉石尤難别異同梅粉光輝羞讓月栁綿輕薄喜當風慿誰說與吴元濟鵞鴨池邉夜未終疎疎宻宻復斜斜雲滿歌樓賣酒家半夜孤兵竒李愬千年佳句笑劉又異常璀璨元非玉頃刻繁華不是花安得風流陶學士松風同煮竹爐茶亂飄亭榭洒虚櫺飛入書齋照眼明天下更無花比白雲間惟有月同清益堅茅屋髙人操頻感窮邉老將情舊日平淮夜深雪光輝仍滿蔡州城攪碎銀河戰玉龍紛紜鱗甲舞天風江山浩浩芳塵逺宇宙茫茫醉眼空春老不香雲樹裏鶴歸無影月明中霜橋驢背尋詩罷自爇寒爐榾柮紅北風吹雨晚聲乾亂撒真珠滿玉盤常訝雲巢驚鶴夢最宜烟棹理漁竿僵眠茅屋不知夜醉著蓑衣尚怕寒却笑當年韓吏部獨鞭羸馬出藍闗梅魂二律飛入羅浮舊路遥東風迴首思寥寥玉容猶想霜晨沭氷魄空疑月夜招望斷西湖春易老夢回南國雪初消枝頭有恨無人見瘴雨蠻烟屬艾蕭春風吹夢夜迢迢香影無蹤寄寂寥和靖作詩空見誄姮娥剪紙謾頻招雲深庾嶺家何在月落西湖恨未消怨殺樓頭吹玉笛粉容芳質委蓬蕭題朱元良友琴圗手巻巻上有髙山流水彼此虚懐七尺軀同音相和久相知坐看峰頂雲飛處話到江空月落時遇得意来俄斷絶到無聲際忽清竒胷中多少驚人句不是桐君合語誰左右司黄郎中以田畝多寡為賦役髙下予田已盡而不除役故作此詩以諷之掌握軍民至重權廟堂隆任豈徒然招邀賔客三千輩管領東南一半天威惠足驚吴越地才能不减漢唐賢猶存賦役為民害剛把無田作有田墨菊卸下前人金縷衣蕭蕭𤣥鬢望東籬西風烏㡌髙情逺細雨黄花舊夢非露洗烟光浮嫩萼雲封秋色上疎枝霜縑素影芳香斷迥首緇塵怨夕暉墨竹與可神逰未易尋子猷仙去硯池深空餘瘦影驪龍舞無復清聲紫鳳吟雨暗渭川雲萬畝月生淇水玉千林秋風滿紙氷霜色中有程嬰杵臼心蘇知縣能染時賦役頻繁負郭之田十賣八九民力已盡催科不休詩中言及之俾知民間艱難云小邑何煩命世豪割鷄寜復用牛刀桃開古縣春風暖琴皷虚堂夜月髙滿腹仁慈遵孔孟異時功業繼蕭曺興来筆下烟雲起千尺龍蛇舞海濤國士誠非縣令才天憐民瘼遣公来亷能清似霞溪月號令嚴如百里雷凛凛氷霜居政府堂堂人物坐琴臺明年二月春風暖剰買桃花滿縣栽山翁自愧坐無氈賦役相承斷復連前載已捐南畈土去春仍舊北山田差科正恐無虚日貨鬻深憂有盡年幸有讀書牕下月夜深依舊十分圎辛丑二月初八日予攜妻子避亂於北山清修寺賦一律奉謝山中故舊云自笑饑寒杜拾遺蹇驢破㡌傍人廬老来亦願栖岩屋亂後何能校石渠落日人惟悲鼔角荒郊誰解把犁鉏荆妻稚子頻相擾刻骨銘心甚日除清明有感舉目闗河盡亂離舊坟新塚正纍纍落花滿徑東風惡芳草連天野客悲無酒無詩寒食節半晴半雨夕陽時埀楊不識興亡恨也雜蓬蒿上翠扉謝王鐵槍相公送還小童採藥癡童出未還悮將魂夢落塵寰雖貪世味甜餐蜜肯忘嵐光翠擁鬟謝子指歸青草徑隨予嘯上白雲山從今穏坐峰巒頂夜夜烟扉月下闗次韻張仲文雪中見寄萬境無聲玉宇空江山晃耀失西東溶溶不夜梨花月衮衮長春栁絮風兒女淺斟金帳酒英雄方建鐡城功池邉鵞鴨休驚擾恐混軍聲耳為聾再次前韻醉眼糢糊宇宙空出門投北誤投東老龍跳落銀河水皓鶴飛来玉闕風謝女有詩裁妙句吴城無策立竒功十年懶聽塵寰事僵卧從敎兩耳聾再次前韻水晶宫闕擁瑶空宫裏瓊姬過海東霧轂氷輪飛廣漢羽衣仙袂舞剛風天神淺試裁雲手海若新成剪水功老子畏寒頭為縮鬢毛如蝟耳雙聾再次前韻深夜沈沈萬象空乾坤一色混西東濕雲冷浸琪花月凍雨晴飄玉樹風老去更無擒蔡術困来猶有煮茶功寄詩勿吝頻敲户茅屋袁生耳不聾元宵雪感懐羽衣雲佩廣寒仙扶翊嫦娥下九天天下山川開玉卉夜深燈火湧金蓮最憂漁艇江波冷猶記鼇山海月圎世亂繁華非曩昔寒缸挑盡謾僵眠次韻逰戱人間百億仙細裁春勝散瑶天九重銀漢翻琪樹萬頃瑶池浸玉蓮貪玩目前春富貴忘觀天上月團圎霓裳莫惜頻頻舞輝映花燈夜不眠金帳羊羔酒裡仙醉觀皓鶴下瑶天寒英忽舞顛狂絮香燄俄開爛漫蓮閬苑有花春未老芳城不夜月空圎茅齋僵卧袁夫子也玩鰲山懶去眠懐赤松雲􅨉舊隠家住青青不盡山石屏茅屋碧松闗鉏雲短钁孤峰頂釣月輕舟一水間埜鹿啣花常欵曲山猿分果慣盤環無端輕作紅塵夢身老乾坤未得還謝邵仲才惠滴乳香海南烟樹飽風霜老樹脂膏臭味芳露濕未乾秋月白風吹不斷莫雲長團團良玉寒生彩顆顆驪珠夜吐光得爾價須增百倍指揮檀麝合稱王重陽值雨西風吹㡌雨沾衣與客如何上翠㣲白髪恨多秋鬢短黄花香冷濕雲飛但須飲酒紉芳佩不用登臨怨落暉採菊東籬陶靖節醉穿木屐著蓑衣又感懐斜風細雨暗東籬嵗月驚心往昔非芳菊有香秋漸老空尊無酒意多違陶潜去後論交寡杜牧吟成見和稀西望山林無限意亂雲多處斷鴻飛乙巳正月十二日雪中感懐梅李争妍冷更榮楊花飛絮濕尤輕雪梢香凍鶯聲􅀈月樹光寒蝶影清兒女祗貪金帳樂英雄空老玉闗情自憐衰朽心尤壯夢裡麾兵入蔡城幽居即事静看餘花㸃澗渠醉吹長笛卧庭除夢回凉月生松榻吟罷清風滿草廬身後豈圗千載譽腹中猶有百篇書溪邉磐石長年坐不是任公釣巨魚寄方仲逺山人初識兼簡劉真白空不空上人一見丰標許不凡齊梁聲律晉清談淡如凉月生巖樹瑩似驪珠映石潭二子形容尤醖藉獨夫鬢髪已䰐鬖何當共訪烟霞子共話前三與後三閑中雜興醉吹長笛倚雲峰静掃餘花坐晚紅幽夢不離青徑月髙情長䇿翠㣲風雖無化俗清時術猶有搜竒摘艶功沙上與鷗脩好罷梅邉教鶴舞晴空題戴石屛詩後石屏字式之騷壇吟社久馳聲句法清竒復老成彈壓江湖鷗鷺喜品題泉石鶴猿驚天邉桂子芳香逺雪裡梅花瘦影清妙語竒言看不盡海雲飛去玉蟾明秋宵月下話休文遺迹石井烟迷半蘚荒休文遺跡堕㣲茫刺桐影冷秋風爽桂子清香夜月凉山洞出雲舒畫簇江波翻浪煥文章汀蘭澗芷春常在人去樓空幾夕陽再題式之詩後石屏父子皆有詩名先生家世以詩鳴久擅吟壇老將名前輩羣賢聞必喜晚唐諸子見皆驚雲幡碧海蒼龍影風逓青林紫鳳聲石鼎煮茶尤韻美松濤濺雪暮潮生重九感興三首牛山逺在亂雲中暮靄荒烟寄斷鴻陶令歸来官况懶孟嘉去後酒盃空羞將白髪欹烏帽笑看青松老翠峰千載英豪一時事菊花冷淡怨秋風黄花白髪淡相輝况是登臨近夕暉斷靄征鴻天共逺落霞孤鶩晚齊飛江空雲影流無盡日暮秋光老欲歸帽落孤峰人已去草深三徑事還非翠㣲影冷玉峰秋與客攜壺話昔逰三徑菊花香未老一江烟浪水長流行登髙閣鴻初到過了重陽蝶也愁已約淵明同酩酊醉欹烏帽雪盈頭樵雲獨唱巻六
