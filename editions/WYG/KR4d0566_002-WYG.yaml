body:
  text: 樵雲獨唱巻二元葉顒撰古詩浙江潮浙江潮從海門起濺沬飛流㡬千里老龍奮拔滄海波六丁怒决天河水萬馬奔馳人盡驚千夫賈勇衆莫禦滔天濁浪排空来翻江倒海山為摧固知神物善幻善變化不然胡為若此之壯哉狂風澒洞響天籟長空隠約轟春雷衝堤激岸勢雄偉舂崖嚙石聲喧豗更秦厯漢逓唐宋潮生潮落来往時時回上浮銀漢蕩瑶浦洶洶危瀾鋪練組江神河伯盡出㳺素車白馬尤雄武海若載鸞旌馮夷擊鼉鼓龜蛇躍長蛟舞人言子胥怒未消怒氣突兀干青霄吁咽吐霧如山髙咆哮呼叱聲愈囂震驚溟渤鳴泬寥直吞吴楚志意驕於戯三綱五常自古有至今禮法千載之下明如日月之昭昭君實有臣而殺奚怨號員兮忠義非兒曹豈不知此無君之罪將焉逃少焉風定洪濤静似聞予言發深省水天上下玉無瑕月白江空銀萬頃錢塘懐古君不見古錢王錢王在時民阜康不侈不僣能安邦五季喪亂人相戕鄰國雖斃吾無傷錢王去後兒孫良致身能弱還能强手持版籍歸宋皇富貴不失福祿昌民受其惠夀命長人懐其徳久不忘千載之下有耿光至今號稱國不忘又不見子瞻作郡臨安時風俗淳厚民雍熈春光淡蕩花栁静凝香燕坐簾幙埀耕田而食鑿井飲公家作勞民不知西湖種藕不種糓朝昏十里香風吹酒邉談笑白日永賔朋滿座咸賦詩風流一代孔文舉下眎山濤阮籍沈湎之輩皆小兒子瞻去後景物非風俗彫弊世運衰我来曳杖訪遺跡荒烟衰草空離離湖山風月只如舊昔人不見今人悲秋風滿目立良久但見斷雲斜日猶照蘇公堤古今何物能長久前代英豪竟安有文章覇業墮渺茫唯有聲名傳不朽是非榮辱過眼空萬事何如一杯酒雲􅨉山人紙衾吟楮桕霜華細藍田玉色鮮全無針線迹寜費綺羅錢照席凝氷潔鋪床奪錦妍巻舒皆自在表裏出天然瑩徹明無滓温柔軟勝綿姜公聞必喜杜甫見還憐素質誠無讓紅塵已斷縁銀屏非等伍石枕慣周旋野客深相結豪家定棄捐不勞寒女織唯稱老夫眠光彩生虚白真純絶外鉛陽生春浩浩暖快腹便便盖覆功非淺清虚理不偏致身天地外迥出羲皇前睡去山雲熱情空海月圎梅花頻入夢香影繞林泉瓊姬亦埀顧丰姿美嬋娟邀我登廣庭恍惚㳺鈞天天風雜環珮上謁瑶華仙遺我不死藥授我長生篇使我顔色好犀齒還榴編蒼容返朱唇緑鬢埀華顛方瞳復如漆碧沼浮疎蓮從兹久住世㳺戯三千年我聞而喜忽驚寤但見清虚滿室月白雲翩翩八月望夕翫月歌八月望夕天大晴纎埃散去河漢清長空皎潔净如洗四顧寥閴秋無聲少焉皓月生滄溟吴牛乍見喘且驚連宵陰晦不見月今夜見月倍稱情寒芒直射斗牛窟滿庭氷雪銀水晶低徊㺯色茅屋上照我慷慨平生誠乾坤虛廓照萬古再一萬古光愈明從兹髙照萬萬古毫髪可容無遁形老翁今年七十一固當與月同虧盈月能燭幽鑒下土人能撥亂至太平二俱有功于天下皆足為世之重輕故能發無盡之幽光埀不朽之令名雲霄有路通蓬瀛仙人相邀逰廣庭朗然晃耀白玉京鈞天樂奏聲鏗鍧風吹衣袂虚泠泠環珮錯雜相和鳴團團古銅鏡燦爛天之庭清輝百千丈神彩何瑩瑩金波㵼瓊液躍出蝦蟆精雲邉白兔知㡬齡玉杵舂香藥未成丹桂不老常芳榮西風凉夜秋花馨姮娥孀居誰與伍美質不眠長獨醒貝宫曠濶寜有極舉歩欲進足屢停滿身風露良久立依然命駕還青㝠黄塵白水三山逺魂夢飄飄迴翠輦恍疑身在紫霞峰影隨大地山河轉霓裳羽衣不復道靈丹難駐容長好君不見萬里闗山全盛時有道君王蜀中老吾琴所為曹令所壊寓居賦秋風破屋歌君不見南山叟一室容身小如斗閉門僵卧學袁安雪打風吹懶開口又不見牛馬走短布單衣寒露肘長途汨没笑李斯咸陽市上牽黄狗男兒壯志要似渭川雲夢竹不染塵埃出林􅅢又似蒼顔勁節松偃蹇孤髙立岩谷雪中矯矯舞㳺龍霜裡㳙㳙濯寒玉春和長有拂雲青嵗寒豈减昻霄緑野人曠蕩無所歸居無華屋膳無肉胸涵膽氣欲食牛世乏才能恥干祿髙眼不復夢功名信步何曾限南北行藏無碍獨縱横動静隨縁少拘束從来任運合天真坦率人皆笑粗俗儒生性僻不入時身老乾坤忘寵辱囊虚買譽百兩金日糴充饑五升粟頑然空洞腰十圍唯貯文章滿斯腹謾開電目燭五行徒援霜毫冩千幅祗聞張奉賤毛生未見夷吾憐鮑叔短琴一㺯固有餘長鋏三彈常不足噫戯安得樂天都葢洛陽城裡萬丈之白裘杜陵大庇天下寒士萬間之廣屋尊賢重道貽今羞大厦寛袍遂吾欲床頭更有酒新熟緑蟻濡唇斟百斛此時不願萬户侯何心更作九州牧山中宰相樂餘年管領邱園慰幽獨雲邉吟咏足逍遥月下壺觴倍清淑閑鋪棋局伴爐薫滿吸湖光飲山淥含烟細草叠芳茵過雨餘花呈繡褥王侯卿相非我儔牧圉樵漁是予屬四時佳景盡来歸泉石烟霞皆素蓄笑拖長袖醉春風寄傲軒牕百斯福山中逰木翳兮林深境幽兮徑平峰髙兮月小澗古兮泉清霧氤氲兮圗形水颼飀兮琴聲春欲暮兮烏啼花落秋將至兮鶴唳猿鳴膏吾車兮整吾駕將有事兮林坰爰發爰啟載興載征訪仙人兮琳宫扣釋子之𤣥扃髙揖浮邱逺邀廣成拾丹田之瑶草採翠巘之瓊英掘棲烟之枸杞斸含露之猪苓駐予顔兮長春延予年兮遐齡與日月兮同光偕天地兮不傾蔽明兮掩聰凝神兮嗇精心清兮欲寡體安兮氣寜絶交息逰罷送休迎不記晦朔寜知虧盈不事王侯寜識公卿雖乏鍾鼎之貴終無鈇鉞之刑塵韁莫繫世網曷縈得失一致寵辱不驚何必論泰山之重鴻毛之輕麻衣之賤金章之榮又何必計蠅頭㣲利蝸角虚名長途擾擾閙市營營蹈草廬之髙躅誦陋室之佳銘土床石枕霧帳雲屏依稀和靖彷彿淵明玩庭梅之冷艶嗅籬菊之秋馨聽鶯鸝之求友呼鷗鷺以完盟展竒松之軒葢鋪軟草之氊茵臨清流兮洗耳汲滄浪兮濯纓躬耕幽嶼獨釣荒汀酒船茶竈詩巻棋枰樵漁賓客牧圉弟兄更唱迭和極論深評雲邉横笛月下吹笙隨心去住任性縱横緬思疇昔慶快平生襟懐洒落胸次峥嶸逍遥邱壑放浪身形悠然遺世脫爾忘情迴視彼抗塵走俗之輩蜂房課蜜之功甚時可辦蟻穴封侯之夢何日能醒亦何異於填海之精衛良可悲夫燒空之火螢北山逰北山山色青更青堆藍積翠開畫屛浮生突兀百千丈駕梁峙石勞六丁自從太極既判混沌死天開地闢知㡬齡東西横亘一萬里逺迎岱嶽連滄溟晨昬礙日遮月星往往不雨轟雷霆荒烟霾霧虎豹隠深淵大澤龍蛇腥幽花野草不識名天風時送芳樹馨風雲變態皆可玩烟光嵐影浮虚櫺有如佳人在空谷體貌閑冶尤娉婷人間嵗月不復記祗隨寒燠觀堯蓂神仙宫殿梵王宅螭藏鳳隠凌青冥金鐘玉磬問逺近洞門無人長不扃道士昔誦蘂珠經功成騎鵠朝帝廷腰懸環珮雜宫徵鈞天音樂風泠泠邇来歴世經累刼丹書寳篆猶鐫銘摩挲石刻一慷慨頓覺胸次洗空世慮塵夢醒彈琴坐盤石遺音繞指穿林坰山靈皷舞山鬼嘯常有白鶴飛来聽湘妃漢女亦逰玩載以霧轂乗雲軿登髙採妙藥長鑱短钁鉏茯苓天瓢㵼石髓瑶杯斟醁醽飲之似欲生羽翎神清氣定百脈寜下視人寰烏兔急東生西没何時停尋名訪利浪自苦便欲脫去世俗凡陋無用七尺之軀形逰行無碍少覊束化為天壤之内不老不死千秋萬古英爽之精靈登九龍山訪孝標遺跡月下飲酒杖藜扶我登九龍輕鞋短袂隨天風九龍飛去㡬千載雲閑松老青山空孝標先生骨應朽清名與山同始終荒烟衰草迷古洞唯有皎皎栖清楓酒邉半醉㺯明月月光忽落杯酒中舉杯歡笑和月吸清光㪚入胷次照我突兀礌磈之孤𠂻平生所藴剛毅氣洞然明白無隠容信知古人嗜好不在酒愛其果能助發英銳之志醖釀麯糵之竒功興懐不盡下山去明月又在天南東中秋懐古玩月空明仙人逰廣寒挟予飛入青雲端罡風吹上九萬里氷輪直駕穏更安碧天空濶髙而寛巍巍金闕非人間瓊樓紺宇開萬户水晶宫殿銀䦨干團圎青銅鏡燦爛白玉盤寒芒曜今昔素液流肺肝滿身風露毛髮爽一衿氷雪衣袂單雲邉有女騎綵鸞清歌妙舞美且閑笙簫迭奏音調古二十五絲錯雜彈姮娥遺我長生丹服餌久久生羽翰朱唇緑鬢顔色好骨剛體健力不殫慇懃再拜謝明月清光留作千載觀東鄰叟歌君莫羨東鄰叟囊貯黄金動盈斗粉白黛緑眩目前十二金釵圍座右袖中曲譜貴新竒五典三墳不知有往来冠葢盡英豪駿馬金鞍結良友天公未必長爾私有限歡娱豈能久華堂歘忽變荒坵落日牛羊亂馳走羨君莫笑西家翁身長七尺眉頬豐閉門不肯學干謁半世不識王與公無心去較蠅頭利有口懶談麟閣功茅屋頺垣常漏月麻衣短袂不蔽風儲乏陳紅之五斗心有至赤之孤忠對客張眉唯說理向人捫腹肯話窮胸中豪氣千丈虹壯志不下陳元龍百年冨貴如飄蓬是非榮辱轉眼空珊瑚數尺壯安庸季倫愚痴真騃童夢囘金谷春已去欲尋往事俱無蹤但見荒烟衰草寂寞棲春紅繁花㪚亂歌舞歇行人撫掌笑石崇首陽山人恨不逢食薇不飽樂在中至今姓字不磨滅皎如白月懸髙穹但見天地之内光輝照耀南北連西東清風遐播億萬古而我無盡物有終俯視沈酣聲利輩空中短燄風裡蟲第一人間快活丸歌贈芙蓉峰蓑衣閑道人貫酸齋號雲石仕至翰林學士休官辭祿或隠屠沽或侣樵牧人莫測其機嘗於臨安閙市中立牌額貨賣第一人間快活丸人有買者展兩手一大笑示之領其意者亦笑而去芙蓉仙人氷玉質貌粹骨剛長八尺閱遍塵寰擾擾人𤣥鬢朱唇雙眼碧利名塲裡寡交游勢要途中絶蹤跡世誇豪富尚榮辱信手拈来笑輕擲留得人間快活丸行住之間常服食平生顛沛藉扶持什襲珍藏深䕶惜吞不得吐不得快活滿懐言不及十分瑩潔滅瑕疵一味無求甚竒特香通九竅達四肢浄若明珠赤如日解歇馳求嗜欲狂能除奔競貪婪疾非辛非辣復非酸不苦不甜還不澁天然風韵妙無倫不讓醍醐寜數蜜食之氣定百脈寜肌肉豐腴美顔色融和春意動鬚眉體健身强百斯力等閑愈嚼味愈嘉肪白膚黄炙逾出時時拈㺯與人看驚起凡愚耀今昔擬將斯藥夀斯民低價無人肯酬直風月笛烟霞屐緑蓑衣青箬笠五湖四海足徜徉萬水千山恣㳺厯邇来歸卧白雲巔晦跡韜光那尋覔雲封讀易臺澗逸彈琴室逺岫正堪觀纎埃焉敢入採山釣水拾松花千載清風有何極衣袂飄飄翠袖寒直上金杯峰頂立飲我紫霞巵坐我蒼苔石說盡萬事非驚嘆羣迷癖嵐氣潤冠裳山光浮座席踢翻煮藥爐砍破長生術洞門無人常不扃開盡碧桃春寂寂長安車馬任喧豗人說公卿都不識樵雲老人獨唱歌樵雲老人年七十髮白雙瞳黑如漆喜唱人間快活歌好吹酒後無聲笛一聲吹動嶺上白雲飛一聲吹動山巔明月出驚醒松梢野鶴棲喚起波心海蛟蟄老来湖海友朋稀貌古形衰無氣力盡日疎齋坦腹眠五斗濁醪時自適常逰北墅劇歡娱每對南山抱岑寂張三李四懶結交黄八趙二不相識自歌自舞興懐真獨步獨行神思逸家無生産萬鎰金囊蓄樵雲獨唱集杜撰八陽經何止三千帙醉墨淋漓不整齊粗言跌宕唯真率丈夫志氣脫情塵邨媪嬌羞貴粧飾長蛇出穴衆盡驚駿馬下坡人辟易瀑岩溜斷峡泉飛茶鼎濤翻海波溢光寒孕出蚌腹珠聲雄擊碎鴻門璧千尋檜柏秀竒峰一片莓苔褁頑石祗圗豪放㫖趣髙肯蹈凡庸陳腐失曹劉沈謝丈人行江左風流亦勍敵自愧滕薛㣲敢與齊晉匹雖乏經邦辭頗盡歸耕術洗浄功名疵滌空聲利疾星斗燦心胸烟霞生肘腋玉澗奏瑶琴銀河㵼瓊液松雲滿草衣岩霏洒石壁空翠撲晴軒虚白凝霄室豪端錦繡機奚藉天孫織語險神鬼愁言竒魑魅泣懦夫忽剛强義士彌感激山靈為起舞萬像咸拱立已免世俗覊猶負林泉癖飲酣拍手呼李白傾倒壺觴同座席共話斯文喪亂後餘子碌碌焉足恤固多狗尾可續貂其奈羊皮殊豹質噫嘘􅐵安得快剪刀剪取雲夢竹䨲毫束作筆刪削鄭衛淫剗除妖艶習斡回正始音書寫大雅什烜赫照乾坤焜耀當天日清風億萬年輝彩千百尺妙理造幽㣲芳馨著今昔虎嘯龍吟天地間蚓唱蠅鳴俱屏跡狂瀾捲盡江漢清隂霾㪚去山峯碧註或問予曰子何易易以詩言也檜柏秀竒喻詩之美固佳矣奈何以區區之頑石比之子何易易以詩言也予語之曰費千金之財不能分寸移之竭萬夫之力不能絲亳動之寒暑不能改其容水霜不能變其節齊天地之終始閱漢唐之盛哀遇狂瀾則為砥柱于中流而不傾處峻險則聳孤標于絶頂而不倚水不得而漂火不得而燬斧斤不能琢其質寵賚不能易其守巍然不怠巋然常存置之渭水左右嚴灘南東傲睨青徑雄踞翠峰俯瞰長流仰揖喬松芝蘭圍繞莓苔褁封延浩月納清風麛鹿聚猿鶴從别有遺世髙士脫塵異翁志氣髙邁趣向雍容慕其髙杭樂此幽竒樞衣讌坐䇿杖追隨彈琴鼔瑟飲酒賦詩朝夕翫賞頃刻弗違在昔豪傑之輩同坐狠石而談世事放達之士忘情醉石以消嵗時英雄遺逸今不復見此名此石逾千載而靡墮予將髙蹈逺引遥紹于諸老不識吾子以為何如于是客喜而笑揖予而退吾乃撡觚引墨而書之雲􅨉天民獨樂歌雲􅨉天民身健武屈指今年七十五衰鬢凝霜暖不消吟眸掣電明堪覩耳聾尚可聽簫韶舌在猶能話今古風標凛凛瘦如松意氣堂堂獰似虎生平快活不識愁祗有攅眉作詩苦得句狂呼笑㸃頭論文猛拍忙搔首栖林𤣥鶴為驚飛出岫白雲俄退走梅邉竹笛半醉吹石上桐琴一長撫飯後歡陪夜月逰飲酣喜對春風舞常呼晨霧鎖松扃逺引寒泉環竹户困尋陸羽寫茶經閑訪陶潜抄菊譜人間俯仰計搃非目下恩榮樂寜久何如丘壑了餘生渴飲饑餐飽摩肚兒學躬耕僕飯牛歸而斗酒謀諸婦客至從嗔不與言坐對蓉峰懶開口不將蹤跡出人前髙眠月嶺烟霞塢已知身世足優㳺唯愧乾坤無報補呵呵呵呵真草莽収拾閑名莫辜負從教世俗罵痴狂任彼時人笑愚魯採蓮曲四首若耶溪頭同採蓮濃粧艶抺誇少年緑荷萬柄映碧水吴姬照影羞嬋娟一雙鴛鴦在芳渚見此躊躇空自憐去年送郎别江滸郎君上馬妾在􅊑湖光㶑灔香旖旎酒味冷冽花鮮妍今年花謝香應老漫郎漫郎何當還吴江女娘氷玉肌薄抺膩粉厚抺脂蘭舟蕩漾翠波裡花間爛漫香風吹蓮心苦難食食之不療饑藕絲短難織織之不成衣採蓮採蓮人未歸山長水逺歸何時江上晚来新過雨亭亭芙蕖在緑水芳洲香霧雜紅雲蘭舟喜殺穠粧女年来年去世情空花落花開香十里今年歡笑復明年㡬向花前共花語荷花顔色只如舊妾顔未必長嬌美只愁八月殞清霜吴中一夜秋風起荷花嬌媚人共誇九洲三島蒸紅霞採蓮女郎十數輩唯有阿姨顔色嬌如花自從嫁後懶梳洗十年不見音信賖管取明年採蓮去撑􅊑直過阿姨家苦雨嘆久雨未便晴昏烟翳穹昊出門泥濘步難行十步九折憂絶倒蘚跡雜苔文侵堦風不掃由春至夏百餘朝雨脚如麻㡬時了樂事賞心何暇論尺薪斗粟無從討縱有髙車可出逰濕雲遮斷繁華道杜陵野老數吞聲床床屋漏吟情惱山翁放達不識愁無端為爾傷懐抱南山豆亦荒北嶼松亦老東園欲語花西徑忘憂草笑臉嬌啼膩粉銷檀心懶吐芳香槁緑怨紅羞既寂寞蜂慵蝶困庸圍遶千葩萬卉總消磨庭下决明顔色好何當㪚陰霾放出日􅀈􅀈麗景穠鮮萬國明晴光浩蕩千峰曉梅友公逰芙蓉峰探神仙遺跡登髙長嘯俯視塵世然後朗吟步月而歸自魏晉之下曹氏父子桓温庾亮之徒登髙對月飲酒賦詩其後寂寥千年世無斯樂今公乃能以雅道繼之葢庻㡬焉予足不至此山幾年矣因公之逰遂喚醒舊夢從道復出詩見示遂次韵焉空山學仙子乗鸞烟霧濕夜深吹洞簫聲斷鳳凰泣佳人去後不歸来寒雲古路迷黄埃當年舊事搃陳迹囘首此意千古空崔嵬杉松㺯影闕仙葢玉宇寥寥浮爽塏洞門無鎖晝不扃雲牕雪浪聲澎湃短世茫茫赴急流功名悮我三十秋人間俯仰竟何補便欲對此乗虚舟登髙探異物夢魂皆髣髴凛然心肺開肝膽忽突兀中有一人眉髮竒不言不笑看晴霏芙蓉為裳雲為衣三花樹下容巍巍隔水㣲茫相對久贈予靈芝飲予酒拍手相從入紫霞不覺麻衣濕寒溜忽然而去不復譍山雲呌斷無人聽是中誰讀黄庭經耳邉忽度琅琅聲醉筆題新詩戱拈爛墨澆淋漓西山紅日忽已失新月夜上横蛾眉兩袖天風清九竅歸去恐為神鬼笑興懐不盡下山来洞口巖花羞自照謝陳國賔見寄陳兄遺我山中詩隨風落空成珠璣寒光遶壁夜牕紫清聲響澗山泉飛杜陵去後天無功飄飄千古遺悲風老兔入雲霄漢黑大龍上天江海空知君筆有萬牛力追轉風騷氣無敵辭豐意逺欲乗虚天髙風冷寒生骨作詩為謝来意勤自慚瓦缶無美音䦨千一撫三嘆息天風西来洗予心金華尉趙徳夫祈雨有感陽烏赫赫明髙穹火雲不雨天西東晴波渴飲千丈虹嘉糓槁死生蝱䖝金華趙宰亦憫農陳辭涕泣呼天公食天之祿因農功視農不救寜為忠下人無罪天所容願為斯𤯝歸㣲躬志誠直通龍伯宫須㬰遣出雙玉龍利爪排空怒且雄阿香推車海若從鞭雲駕雨隨天風下與人世為年豐要令饑旅顔囘童少焉雲㪚天宇空神龍却歸潭水中廟閑山空鼓鼕鼕謝李從道見寄漢唐之世多俊賢才髙有如横海鱣搜索異景不得潜驪珠一夜飛上天江左風流亦可憐髙談出口如湧泉近来諸子無足言白鷄夢破千千年斯文無人世所寃遣公出世扶其顛遨逰八極乗紫烟絳旂丹轂驅我先我生嗜酒無一錢酒酣落筆驚四筵見公始覺心茫然仰天大笑呼謫仙天風吹落雲錦篇皎如明月墮我前寒光耿耿江底懸魚龍夜抱星斗眠議論汹汹来百川似欲上拍曹劉肩有人如此猶棄捐朱顔改後寜復妍願為羲和執玉鞭駕馭白日青雲邉請公早上登封箋題聽香亭梅花巻山空木落彫繁卉政苦蠻烟愁瘴雨南枝此際特清竒獨抱孤真巖谷裡水郷雲路寡相知惟友風姨交月姊江南嵗晏淡粧束沙上無人薄梳洗丰姿瀟洒態度閑修竹疎籬茅屋底羅浮日冷水欲氷凍靄昏霾江路隂殘雪消遲霜魄出一梢寒彩明空林人知鼻臭目善睹豈知刼外春光淡蕩春意深平生不識宋廣平但識鐵石腸肚珠玉之胸襟平生不識桃與李竒松勁柏屹立千仭之雲岑唯許孤鸞雙鳳見豈容妬蝶狂蜂尋幽香旖旎薫宇宙芳流不盡古至今暮齡作事愧顛倒聽不以耳唯以心瑶琴三㺯枯樹下摩挲老眼觀妙音西湖處士寜復道東坡先生骨應槁邇来八萬四千載只有梅花顔色好羌笛聲髙舊夢醒玉樓人去東風杳横斜浮動未要論竒芬不在枝頭老再賦聽香亭并序予既賦聽香亭梅花詩書於巻尾已而興懶神疲髙卧雲樹之下夢美人玉容氷質風環雲珮揖予而言曰子之詩雖美矣何獨于聽香㣲㫖乏吟咏遂俾幽姿減艶雅態違歡公䏻不遺幸續賜題品使枯荄朽榦頓發竒芳幽谷寒巖倍增春色豈唯無負于梅花而不肖亦免以藉口伏惟司花之真宰不識吾子以為何如予乃劃然而寤即操觚洒墨復題一詩雖未足驚羣聊以謝六橋么鳳爾聽香亭畔春風起吹折瓊花三兩蘂烟梢留宿白雲飛横渡溪橋歸海嶼雪消南國近黄昏月照前村半江水五更霜重玉容寒吟翁睡足茅屋底夢中非我亦非梅非鼻非心復非耳但見芬芳遍太虚唯聆馥郁週寰宇幽香和凍墮琴床旖旎肝膓熏骨髓胸次峥嶸妙莫窺襟懐洒落竒無比醉後頻驚往事空醒来倍覺吾廬美疎影横斜澗沼中韶光浩蕩乾坤裡雌蝶雄蜂浪自狂山猿野鶴深相嘻畫角髙酣興不孤玉簫婉娩情難已霧鑰江南去路迷羅浮望斷知何許擬祛聲跡絶聞塵汲引深情為君洗畫竹王汝明為賦永和年間王子猷月林吟嘯最風流秃錐渴飲三斗墨為寫琅玕萬頃秋元祐年間文與可四絶聲名落江左渭川千畝在心胸噴飯滿案饞唾墮此君髙蹈只如此二老遺踪成坎坷王生畫竹妙逼真清竒不愧前朝人情空意定偶一掃坐令寒岩空谷囘陽春我疑此子有神助不然何以得此胸次瑩潔不受纎埃侵孤標勁節冠古今霜容氷彩勢百尋往往青鸞偕紫鳳飛来錯認舞且吟常訝凉飈生座右耳邉自聽蒼龍吼煩君留意重珍藏倘遇雲雷恐飛走疎齋清樂按此長律舊誤編衣袂飄飄羽扇輕草廬瀟洒興懐清孤桐調逐秋雲杳老桂香陪夜月明附鳳攀龍雖寡術呼鷗喚鷺足尋盟蘭臺一任無聲譽竹帛從教缺姓名白石清泉皆屬我黄花翠竹正闗情日髙丈六猶慵起石枕松風夢未醒秋冬之交雷電大作蓐收行秋將滿秩解印榮歸嚴辦集清道迎冬俟臘来積雪嚴霜應有日遺蝗入地作年豐禾黍登塲吾事畢九月中旬之望夕天大雷霆轟霹靂蝦蟆蚯蚓盡出逰碧潭驚起蛟龍蟄炎炎溽暑勝暮春赤日行天欲焚炙𤣥英勒駕遽奔迥意恐中途例遭殛電掣金蛇走林莽勢似金桴擊天鼓浮花浪蕊亂青紅痴蝶狂蜂恣飛舞唯貪過眼暫繁華寜慮来年百斯苦應是蒼生罪惡深過犯彌天致天怒我願天公憐赤子撫綏恩育宜如故渇飲饑飡貴得時夏熱冬寒合常度寄聲司令省厥躬爕理隂陽勿乖悮偶成我先落魄何所為百年生計巢南枝迎風吸露飲山淥枕泉潄石吟新詩一絲不掛心自樂澹然性靈學無學洗耳熟聽空山猿知心更有空山鶴漫漫長夜何時晨紛紛塵世何日清餔糟啜醨難自强獨醒肯圗千古名君不見嚴光片石生白雲江湖夜永秋水深碧絲牽動潭底月直鈎釣斷人間心寄王善甫昔公曾住金芙蓉白雲為侣棲丹峰乾坤爽氣星斗胸手㺯明月烟霧中十年燈下詩書工今年試藝棘闈中其氣似欲附𠖇鴻翅拍天水揺天風行將杖䇿朝聖主豈止小展天南東願公獻賦明光宫直驅造化超洪濛筆陣縱横誰敢攻八荒一掃空奸雄致君在上竭我忠要令四海歌重曈有如醫王逞神功下與濁世鍼盲聾夢魂夜夜思見公凝望不来憂心忡人生飄忽浮萍踪百年光景轉眼中秋風道上㑹相遇便須握手一笑談空空送洛陽陳秀才蘇秦辯口人共知黑貂敝盡朋舊疎六侯相印幸得佩一朝身戮埋荒墟賈生才調天下竒幾年獻䇿承明廬䜛言入耳竟不用長沙抱恨何當紆玉川先生妙人物秋風破屋聊自居觀其大節死不變家中豈有擔石儲香山居士亦足數達哉達哉誰得如二程兄弟百世士孔孟之道賴以舒談經說理妙無盡天下學徒来挽車堯夫君實古淳士胸中包褁混沌初西京華麗推第一春光只滿二老閭前乎說客姑且置後来賢哲世所譽洛陽古俗稱多士遺風掃地今無餘陳生亦是嵩山客從軍久戍江南瀦彎弓走馬非所慕無事閉門長讀書抱琴辭我欲歸去因思往事難自攄歸與瞑坐倘神㑹為言每譚斯道未必不為嘆息涕淚增欷歔招友人歸隠行中郎一絶㸑下音流水無思山無情仲尼一為麟後塵乾坤日月無光明聖賢自古多轗軻吁嗟吾子難獨鳴青山雖貴何足欽黑貂未敝君休驚片言不用脫屣去富貴於我浮雲輕日飲一瓢豈予辱日飡萬錢非我榮進退于道茍無愧對人何必面發頳幸有浮蛆之桑落為君斟酌平生誠幸有棲鸞之桐木為君彈出無弦聲一彈石澗潄寒玉再彈滿耳松風清酒酣更鼓三五曲魚龍鼓舞波濤縈男兒出處須磊落肯同兒女徒營營麻鞋布衲見天子誰能干謁公與卿指蹤利害談世事坐令海内皆昇平不將歸卧南山隂荷衣未必輸塵纓青山緑野總舊物白鷗𤣥鶴皆昔盟上飲千尋之澗瀑下採百嵗之春英食之不饑復不老永為終古天地精斯言雖鄙倘見聽便當盡决滄浪之水洗净平生不朽無用之虚名次韻靈源唯堂上人逰九龍山羣峰嵯峨互相依九龍跳躍萬馬隨蒼松恠石倚天碧嵐氣日夕沾人衣幽花野草香澗谷山中寒暑自四時孝標當年隠其内勁節上與山争竒紛紛餘輩方進取誰能退縮山之陲困来和雲卧白石醒後衝烟登紫㣲古今名利天下重此子似欲一手提白頭老僧好事者泛覽景物裁為詩使我一讀重嘆息玩味展轉忘其疲世途擾攘吾已厭便欲命駕尋荒祠左驂白鹿右黄鵠與子相從不爾離芙蓉堂次鄭氏子韻芙蓉堂中見嘉什與君似有三生約髙才磊落亦可憐誰謂今人不如昨我疑此子胸有天地春不然别有一邱壑男兒趣向貴如此慎勿戀他兒女樂一襟爽氣已逼人塵氛不假滄浪濯筆端滚滚龍蛇飛紙上霏霏烟霧落謫仙蘇二呼不来江湖夜雨蛩聲哀觀子新詩何所似秋空一鶴山崔嵬山靈起舞神鬼笑林泉變色雲屏開波光月色清可掬風露滿身寒肅肅還君此子不復言驪龍抱珠海底浴樟木歌婺創府㕔事幕官入山有巨木者咸取之予鄰有樟木亭亭若仙盖㒺知嵗年父老相傳厯五季趙宋云予暇日往還吟嘯於其下至是例辱斧斤賦長句弔之古木千年隠林麓傲雪凌寒久幽獨霜皮雖無四十圍中有昻霄氣盈掬孔明廟前色頗同草堂詩老慣撫育雨淋日炙嵗月摩榦槁根摧忽顛踣樵夫芻客不我顧長伴蒼苔映寒緑今年公府創髙堂梁棟求之苦不足幕官騎馬自入山匠者驅馳如鬼速自慚拙才復何用例辱斧斤蒙齒錄山翁因笑百無能一生支離同此木撫木三嘆為木言如此奬擢非我欲不願爾為秦皇阿房宫不願爾為漢武黄金屋兩君富貴驕且淫是中唯蓄美女藏珠玉但願爾為幽人廬滿貯烟霞寄空谷有時惟聞讀古書凜凜忠義横在腹有時惟聞彈古桐髙調凄凉聲斷續否則搆作承明廬巋然長在天子目廣延天下之英豪獻可替否干王祿此時不獨木爾榮四海蒼生盡蒙福月夜泛舟今夕何夕夜未終長空月出光瞳矓乾坤一色净如鏡水天上下磨寒銅晃如徑寸珠髙耀馮夷宫清寒泣神鬼竒恠驚蛟龍我乗萬斛舟直入玻璃中雙漿擊空明孤帆颺天風狂吟發長嘯有似蘇長公湘水居其西采石居其東屈原與李白此地遺髙踪我處二者間拍手招兩翁獨醒醉魄呼不返扣舷大呌應耳聾百年清賞誰與同茫茫千載情何窮採蘭芷兮水冷探明珠兮江空詩成嘆息無可語因風寄與天地之内古今不朽之羣雄芙蓉峰下有梵宫曰智者禪苑寺左右塘蓮花盛開僧與文士賡和者多予次其韻馮夷仙人氷玉瑩緑葢雲鬟踏明鏡嫣然一笑隔烟波露濕臙脂容貌正道人心地亦清雅不染淤泥出正定豈無竒士同品題亦有山僧共􅉼泳芙蓉山色秋更癯斜日黯紅愁對影喚囘西子昔年夢淡粧濃抺嬌相並不向湖山逞顔色天香槁死無人境有如禪僧懶出㳺白首甘心老鄊井雪中見寄六丁劍攪天地水倒㵼銀河洒寒雨舞空鱗甲動天風玉龍飛下玻璃圃乾坤萬里混清光廣寒誰借脩月斧竒葩異卉恣粘綴寜煩獺髓鸞膠補無朋懶棹子猷􅊑何人肯扣袁安户不愁僵卧酒杯空石鼎烹茶試鸚鵡次韻𤣥㝠神人眼如水剪綺裁雲雨花雨翩然騎却玉麒麟東逰弱水西瑶圃手移泰華與祝融削平豈假巨靈斧似嫌塵世有髙下紛紛亂把瓊琚補夢裡渾疑月滿床醒来但覺雲封户銷金帳暖阿誰家唱飲羊羔醉鸚鵡和王存誠洞天長篇神仙姓字留丹書神仙舊宅巖谷居昔曾躡險探仙迹問我俗慮何當除長生妙訣誠足學讀書萬巻將奚如曩思封侯食五鼎今愧半世成躊蹰頑軀七尺走塵土多情白髪勞自梳因君贈我錦繡句夢魂日月金芙蕖桃源烟水但如昨欲尋舊路仍趦趄焉得瓊杯酌仙醑與子共駕五色車碧雲望斷杳莫致臨川結網徒羨魚已辦刀圭生羽翼脫凡換骨乗天與長揖安期赤松去握手大笑憑空虚童髫緑鬢埀兩耳天風一任寒蕭疎春雪百花憔悴東風寒六花爛漫開正繁東君似欲誇富貴瓊臺玉樹真珠䦨緑楊無力晴抛絮青松不老雲生樹貪觀天女跨鸞歸失却仙人騎鶴處斜斜整整復霏霏却憶銜枚入蔡圍竒功未立英雄老壯志雖存氣力衰酒酣舞劍情難歇指㸃銀缾莫教竭醉中猶自憶當時鵞鴨城邉一池月童子良和徐曉山春暮行樂落花香逕紅堆積鶯老慵歌蝶懶拍平生愛花復愛春為見春歸痛憐惜杖藜􅂸却十日逰春風滿袖雲生屐功名于我果何有棄置有如機斷織但喜杯中面發紅寜愁鏡裏頭添白空嗟口讀書萬巻却笑身不滿七尺長安富貴輕薄兒甘心老死黄塵陌大開冷眼看青山旋拾枯枝煮白石有手不掣東海鯨何心更釣西江鯽麻衣草履萬念空深悟黄金與瓦礫因君語我徐曉山我亦聞名未曾識人生豈在見顔色但從意氣中相覔美許士謙𨕖壯丁有法二章霜臺憲郎文且武曾侍繡衣持玉斧指揮猛士氣如虹要縛南山白額虎檄書下縣㸃壯丁十萬農夫勝羽林不跨黄牛騎白馬腰弓直入秋雲深喪亂以来無定止民物蕭條半為鬼郡縣誅求猶未已眼觀如宜淚如雨於戱安得老天開太平盡戮奸貪天下治烏臺憲史天下竒姓氏久為人所知風霜面目松栢操鐡石膓肚氷玉肌羣凶肆虐干天誅潢池㺯兵如小兒中原在處皆反側擄攘豈獨東南陲寓兵于農古王制憲史于此力主之羽書差兵以萬計頃刻而集敢後期厲兵秣馬在此舉指日要斬蚩尤旗廓平天宇清海嶽獻俘授馘朝丹墀東州老翁頭雪白拭目願見承平時南山有石踞如虎攜歸我欲鐫公碑謝東陽太守趙子威牧守有理詩以美之時為御史東陽太守㢘而忠風骨自是人中龍分明面帶氷霜容雙眸烱烱懸方曈皎然一鏡磨青銅世間何物堪蔽蒙昔年眷顧恩寵隆繡衣持斧騎碧驄如今五馬白玉􅎸下飲雙溪淛水東金鞍玉勒相磨礲大江南来財阜豐貢賦號稱天下雄邇来賊盗飛蝱虫潢池㺯兵驚兒童貪官汚吏復妄庸誅求何異蠆與蜂饕餮不已民心忡温處在在罹兵鋒花溪小邑俱烟烽可憐州郡一掃空明公撫安竭至𠂻至誠感物人共宗揚清激濁體大穹見善是輔惡乃攻不吐不茹恪且恭視民疾苦勞厥躬愛育偹至久不慵有如名醫治盲聾盲能再覩聾再聰又如大造運化工初不用力理自融十日一雨五日一風根器厚薄隨所逢春風桃李秋芙蓉白者俾白紅俾紅有蔬可茹榖可舂化工何恩及吾儂父老感泣涕泪濛不圗見此矍鑠翁我願公心與天通舍其小者大是從廣陳方略達九重盡化四海之羣凶賣劍買犢為年豐不然上書乞總戎駕御豪傑如轉蓬殄滅醜類無遺蹤四海混一車書同廓平天宇路不壅露布直到天子宫獻俘受馘太廟中脩文偃武開辟雍尅期封禅泰華峰大快義士平生胸令當建此補衮功論功合受大國封堂堂政府食萬鍾揖遜進退咸肅雍身佩安危勢位崇富貴豈下汾陽公海枯石爛物有終公之勛業髙岱嵩公之令徳傳無窮題愛栢軒古風軒前古栢顔色蒼鬱如車葢當兩廂霜皮雖無四十圍老榦似有千尺强雲梢已足庇猿鶴月樹或能栖鳳皇孔明廟前曾識面飽沾雨露凌雪霜清陰時作長蛟舞壯氣每學蒼龍翔虬枝直上九萬里䕃覆天下為清凉常疑半夜風雨響怒潮駕浪翻錢塘少焉女媧奏笙簧仙人環珮朝玉皇巋然俯瞰君子室鸞臺鳳閣遥相望連甍接棟眩青碧雕楹刻桷施鉛黄往来吟嘯謝樵牧冠葢絡繹多金章嬌鞍俊馬勢豪逸弭貂鳴玉聲鏗鏘内中有人貌異常峩冠大帶美且臧紫霞之佩雲錦裳當軒危坐軒中央手㺯瑶琴音琅琅耳邉雅調流宫商金盤承露傾天漿忽然飲我瓊琚觴柏兮特立堦砌下嵗晚相對操愈剛豈無朱䦨護文杏下視不啻兒女行竒才偃蹇不世出聲價豈减楩楠樟吁嗟爾柏後必昌大匠遇之未易量或為柱石或棟梁豈可久客卿相傍慎勿搆作祖龍宅驪山突兀之阿房慎勿搆作黄金屋茂陵秋風之劉郎惟帡珍禽貯竒獸多蓄美婘閑嬌嬙寜當架為幽人廬三重茅屋山之陽雖無精金乏良玉缾儲斗粟書滿床床頭常留酒一缸壁上髙懸琴一張讀書彈琴飲醇酎醉卧不夢封侯王死生無可無不可身無富貴名字香達則營建天子堂不傾不倚安四方招延英傑納俊良致君堯舜弼禹湯羣后歡呼趨廟廊要令華夏歌虞唐海宇雍熈萬姓康天錫百福夀命長子孫持此傳無疆栢兮女與有耿光再三語栢栢無語願言終久毋相忘姜明徳醫學錄任滿詩用美之并以醫之利害語之丈夫生世六尺軀饑餐渴飲當及期目觀鼻嗅耳司聴各職廼事爾勿離喜怒哀樂無妄施威賞之柄不倒持雍容進退動合宜天其相汝百福隨神清慮淡夀且耆顔色豐澤毛髪黟無不足兮何所望子孫妻妾皆歡怡寒温風雨倘失時人心私欲復蔽虧堂堂正氣日以衰瘵癘始得乗其危膏肓一穴自古有區區二竪寜知斯惜哉醫緩不務此倉卒遽謂疾弗治若藥暝眩㒺不愈縮手退避計或遲乃知用藥如用將用非其類悔曷追芫巴烏附吾所用參术之輩胡能為信乎藥者亦㓙器古人不得已用之姜君職醫識此理愚民攀慕賢守知延年卻老學妙術囘生起死㕘神竒杏林春色香韻美芳葩漸滿東風枝他年丹石億萬斛慎勿往取虎竊窺我身剛强甚無恙半世落魄癖在詩賦性掘强成傲物胸次未掃平生癡髙談驚世鄙俗訝左計失䇿羣兒嗤疎狂往往激衆怒而我戯笑方嘻嘻豈無甘言恱人意胡塞巨口而不䛕後先顛倒皆類此願將斯疾祈君醫願將斯疾祈君醫辛丑嵗軍亂後李元常賦詩傷感予次其韻亂後依然舊城郭青山不老秋雲薄人民皆非可奈何嵗月無情隨逝波短世功名何暇論相逢存殁驚相問夜寒兒女泣牛衣紫鳳天吴顛倒披訪舊驚心生百感兩脚如麻春不暖秪多幽滯哭酸風何人背面啼春紅次韻以述老懐寄前人龎老何曾入州郭布襪青鞋衣袖薄聘呼不起奈爾何心似無風井水波竹帛虚名奚足論草廬清夢毋勞問天風吹袂雲滿衣醉騎黄犢烟簑披人生有情徒感感笑聲酒面春風暖可憐奔走牛馬風妄自粉飾誇青紅過李從道故居有感數間古屋荒村道滿地蒼烟鎻芳草酒酣獨歩憶當年㡬逐西風訪詩老主翁去後寜復来户外白雲人不掃青山依舊事盡非斜日黄花為誰好樵雲獨唱巻二
