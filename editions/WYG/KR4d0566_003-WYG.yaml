body:
  text: 樵雲獨唱巻三元葉顒撰絶句次友人題丹井韻仙人學丹井丹去月華孤無復秋風夜雲邉響轆轤辛夘冬雪裏尋梅三首寒雲濕不飛江路踏瓊琚香影無蹤跡羅浮月上初月色滿人間前村步又艱南枝尋不得何處是孤山逋仙凍欲僵春色惱吟腸繞樹全無影滿身都是香㳺三洞金盆諸峰絶句二十首長松撑白雲偃蹇㡬千載而我能㡬何松雪鎮長在䇿杖逰洞天石羊卧荒草平起不載逢㡬見春風老仙翁出洞口笑我兩鬢華塵世累變更翁貌長如花雲巔老猿吟松下仙犬吠山童不知名嘯入青雲去峩峩萬疊山曾閱㡬人老我老不少年山老色愈好渇斟東澗泉饑煮西山石醒時䇿短笻醉後横長笛岧嶤金華峰蒼松凛髙秋仙人坐不成嵗月空悠悠青山如佳人白雲如逰龍佳人節不移逰龍去無蹤我昔為童兒登髙而作賦我今髪如霜青山但如故徘徊三洞天拚作十日留何當約安期共為千載逰山靈見我来撫掌一笑莞喜我成此逰恠我来何晚不為世網縈肯受儒冠悮兹逰快平生并了泉石痼大山嚴而尊小山婉而秀往来兩山間巖霏濕吟袖平生酷愛山嗜好如猿狙行将脫塵俗上與浮雲俱久從山中逰頗識山中趣狂吟採松花撼動雲栖樹已無名利心猶有烟霞疾汲彼千尺清洗此方寸癖犬吠人家近鳥啼春晝晴澗草有幽色野花無定名恠藤揺蒼烟芳林滴晴雨閑花逞嬌姿笑舞春風裡褰衣陟芙蓉挨雲拾瑶草寘之懐袖中食之顔色好雲邉學仙子貌古懸方曈閑揮白玉麈笑坐青石峰曉窓禽語二首紙帳夢初醒山窓月上明宿雲離石去幽鳥話新晴殘月滿山阿長松㺯清影幽禽啼數聲吟窓人睡醒題丹井二首閑雲埋甃冷皓月照前空仙與丹俱化苔花㺯曉風浴丹仙已逺甃冷蘚痕鮮斷綆無人汲空遺浸月泉題丹竈丹成仙去後竈古白雲邉灰冷空餘燐林荒鎖斷烟題石羊二首二仙牧羣羝食盡丹田草化石㡬何秋牧羊人未老山邉牧羊者誰得似初平羊化人俱往年年草自榮王粲江樓王粲登臨客雲閑獨倚樓西風千里興落日半江秋莫愁烟艇莫愁江上艇月夜扣舷歌甚欲尋遺跡江空烟浪多范蠡雲舟范蠡平吴後秋風理釣􅊑情空青嶂下夢落白鷗邉嚴江獨釣光武中興主嚴光避世翁雲邉一片石江上㡬秋風赤壁清㳺魏武吟詩夜坡仙玩月秋英聲流後世清興動南州夢㳺金盆峰二首愛山如猿猱清嘯卧雲石山雲入夢来相見如舊識有懐金芙蓉經年未能去青山入夢魂白雲生杖屨看山薄俗易炎凉浮雲屢更變耐久屋外山相看無厭倦題泉石髙情圗流水閑雲外青山落照中詩翁扶瘦䇿相與聽松風題西施蹙額捧心圗憔悴兩娥顰春山鎻恨深東鄰正嘗膽西子謾捫心秋日飲友代東二首烏㡌風前落黄花雨後香淵明三徑裡明日共壺觴詩骨秋来瘦山花日暮香殷勤一樽酒相與慰荒凉草堂歸来圖二首鶴髪兮倚閭山空兮夕暉白雲兮髣髴㳺子兮其歸㳺子歸心切慈親望眼空白雲千里意瘦䇿倚秋風疎齋晚步荷老難擎露水清偏見魚好磨青玉觜一飽更何如巖前夜坐修徑白雲幽山空明月秋長松髙百尺明月襲衣裘秋暮田園雜興二首濁酒滿斟自適柴門雖設常關與老為期白髪相看無厭青山峰頂雲閑懶出松邉鶴去應還獨步秋風頂上興来聊盡吾歡春郊即景㣲雨㺯晴天氣輕寒釀暖時光栁外凉飈滿袖花邉香露沾裳沙溪清隠繞屋一灣水緑迎軒數朶峰青沙露鷗盟新定雲松鶴夢初醒幽居即事二首吟座半窓殘照琴床一枕閑雲塵外興懐有味世間姓字無聞騎牛過白雲嶺放鶴出翠松闗樵唱偶歌一曲清聲直度千山九日寄興三首庚申嵗故侣無心送酒老翁有意留題舊日龍山佳㑹如今風雨淒淒白髪凄凉舊里黄花冷落東籬西望夕陽歸去淡烟衰草堪悲黄菊香殘夜雨烏紗醉落秋風囘首十年舊事亂雲流水西東月夜梅邉即事香裏寒雲滿溪月明津渡人迷夢入江南舊路夕陽流水橋西送阮師真之宣城江東日暮雲閑敬亭千古髙寒若見謝公傳語沈郎依舊衣寛送人侍父入吴生子如李亞子不然如孫仲謀景升諸郎豚犬焉能侍父逺逰與故人叙别六尺形軀銷瘦十年故舊西東試問市橋官栁别来㡬度春風逰北山諸峰四首水泠泠兮樂奏風細細兮鸞吟月随人而有意雲出岫以無心山嶙峋兮北邁水嗚咽兮東流欲尋源而逺去思絶世以無求約芝蘭之環珮葺薜茘之裳衣躡烟雲而髙蹈世與我以相違折南澗之芳芷採西山之嫩薇贈佳人兮為好與握手兮同歸時苗留犢圗楊子平生四畏劉郎臨别一錢甚矣時君留犢審觀三老孰賢題王夀卿烟雲叠嶂圗一百八盤山路七十二峰曉寒日暮烟横谷口雨餘雲宿松端題李克明翁媪起家圗一翁以指就醋瓮取醯吮之嘗其味之美惡一媪持星火吹燈備諸窮態乃叟宵衣製醋厥妻忘寢治燈辦此難成家業遺彼不識𤣥曾樵雲獨唱巻三
