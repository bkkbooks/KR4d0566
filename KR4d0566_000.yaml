body:
  text: 樵雲獨唱别集類四元提要臣等謹案樵雲獨唱六卷元葉顒撰顒字景南金華人志行髙潔結廬城山東隅名其地曰雲􅨉自號雲􅨉天民是集乃其孫雍所編前有自序謂薪桂老而雲山髙寒音調古而巖谷絶響故名曰樵雲獨唱序凡二篇皆題至正甲午而集中多載入明詩且後篇乃明興後語疑原本後篇未著年月傳寫者誤以前篇年月補入也顧嗣立元詩選曰列朝詩集載葉樵雲顒字伯愷洪武中登進士官行人司副免歸按集中挽林荆山上人云大德庚子春生我及此公以年計之當洪武戊申景南年六十有九矣其獨樂歌云屈指今年七十五集中詩皆髙曠之言絶無及仕宦者袁布政凱序云使先生後生數年際我朝之明盛與一時俊乂並列庶職其事業必有可觀惜其不然而徒於言語文字間見之其志不亦可哀乎袁序作於成化間不應有誤列朝詩集所載未知何所據也又震澤編載東山葉顒字伯昻嘗以鄉貢為和靖書院山長則又一同名姓者耳云云其辨甚明案太學題名碑建文庚辰科有葉顒亦金華人庚辰為建文三年革除以後稱洪武三十三年列朝詩集當必因此而訛嗣立尚未之詳也其詩寫間適之懷頗有流於頺唐者而胸次超然殊有自得之趣天機所到固不必以繩削求矣乾隆四十一年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五樵雲獨唱目録别集類四元卷一古詩上卷二古詩下卷三絶句上卷四絶句下卷五律詩上卷六律詩下樵雲獨唱原序豫誅茆結廬於城山之東隅林深而木翳水秀而峰竒居處孤峻名其庭曰雲􅨉閉門却掃謝賔客日與樵夫芻叟盤礴乎丘園林麓之中披雲嘯月釣水採山無少休暇久之移家城山之西隅負郭而樓居形勢虛敞窗户軒豁而南嶼北巘爭獻竒秀其儼然之容蒼然之色入吾屏几清致復不減於雲􅨉也東西相望不數里故吾得以幅巾便服輕鞋瘦䇿從樵夫芻叟相往還於其間山回路轉川鳴谷應伐木之丁丁鳥聲之嚶嚶更喚互答斯樂何極斧斤之餘濁酒自適觴詠談笑擊壤賦詩以唐律五七言二百餘首雜詩若干首雖不足以關世教之盛衰亦足以敘幽情寫間適之興懷名其秩曰樵雲獨唱蓋豫知樵夫芻叟相與之娛而不知世俗之好樵夫芻叟知從豫之遊又不知豫賦詩之趣薪桂老而雲山髙寒音調古而巖谷絶聽得不謂之獨唱乎幸而樵芻中有如朱翁子陶靖節輩固將甘心與之揖遜周旋賡和酬酢商度古今天下治亂之得失評論髙人異士出處之始終豁疇昔風誼之氣吐平生慷慨之辭散為針規發為歌詩峭拔俊爽雍容舒徐放而縱之而言不肆收而藏之而文不拘振清風於亘古流遺響於無窮者也樵唱之樂無以易此不幸而世衰道微斯人儻不復見則豫長抱山阿寂寥千載誰賞之歎而獨唱之旨其有以夫時至正甲午重九前四日雲􅨉天民景南葉顒序
