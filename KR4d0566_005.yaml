波空晚興蝸舎水雲鄊巢棲蝶夢長竹揺丹鳳舞松撼翠蛟翔鶴影深秋瘦蟾光半夜凉自慚無汗馬牛背度斜陽江路晚逰吟袖舞天風輕鞋䇿瘦笻濕雲辭􅏜石凉月上竒峰樵唱穿林曲僧撞出嶺鐘横江清夜鶴歸宿大夫松幽居門對北山峰牕迎越水東松枯青嶂老花落翠岩空幽谷飄晴雨虚堂含晝風相羊烟栁外吟嘯夕陽中古意江漢遨逰女吹簫伴月明曲終人又去聲斷意還驚雲盡湘潭暮潮囘浙水平英雄今昔事日落逺峰青幽棲若問幽棲地吾廬住翠㣲步隨青草逺興與白鷗飛衲褁秋雲去囊挑夜月歸塵埃雖滿世難染芰荷衣與錢提領錢鏐千載下何幸出斯郎鼻祖聲名盛聞孫姓字香吴山歸夢逺越水宦情長幕府誠淹滯期君仕帝鄊次韻賈逢源見寄二首不成驚世事媿讀古人書老去功名懶貧来故舊疎白雲生戸牖明月宿庭除亦有無心者攜琴訪逸居短髪彫秋鬢天風快晚晴閑唯欣有味老不歎無成白石和雲煮青山帶月耕無心少年事慷慨樂從征江村即事贈人長笛倚風吹江邨對夕暉烟迷前岸栁月照後園薇髪白何勞鑷山青正好歸塵埃方滿世慎勿染荷衣午夢感邯鄲舊事清睡午炊香槐安仕路長征遼辭激切憂國志忠剛赴召新承寵遭䜛復致殃危疑忽驚悟大笑海蟾凉逰賞清樂四首烏㡌翠雲裘行藏得自由月宵尤醒藉天路更風流不作塵中夢甘為世外逰林泉堪縱目勢利懶囘頭華髮雪霜眉頻將羽扇揮兒童呼矍鑠樵牧笑希夷不識當今諱寜諳薄俗機清歌三四曲猿嘯鶴驚飛竹杖芰荷衣青鞋白接䍦腹儲徐邈酒胷貯杜陵詩白髪搔風短青山過雨竒杯酣芳興動簫管倚雲吹野服㡌頻欹登臨倚翠㣲清烟衰栁外孤鶩落霞飛草露粘芒屨松雲上布衣清吟山路晚瘦䇿踏斜暉贈一敎官逰學者燈火老書牕功名志未忘青衫驚嵗月白髮老風霜累作東吴夢頻觀上國光十年猶未調感慨憶馮唐城中一佳士贈所知城中一佳士借問不言誰解唱無聲笛能吟落韻詩三杯隨分酒一局不争碁到處無人識唯應野老知次宻印精藍光上人韻二首蔬飯度春秋何心向外求但能存取舎自足絶恩讐嵗月驚青鬢風霜變白頭騰騰常任運無果亦無脩石邉清睡醒松下獨吟餘小徑雲収後空林月上初梅香凝几案竹影掃堦除湛湛長空净纎埃半㸃無送蕭君祐憲史陞南臺掾二首建康人漢朝丞相裔臺閣慣懲膺雲海横孤鶚天風快俊鷹幾年居寳婺後夜發金陵李白題詩地闌干試一凭霜臺新聘客家世出蕭梁况乃辭江浙翩然往建康六朝烟樹老千載暮雲長見説孫郎宅青山帶夕陽送憲奏差丘魯瞻還淛江二首堂堂烏府士聲已播錢塘投劾驚神鬼摛詞凛雪霜潮囘吴渚冷月落越山長西浙今非昔期公正紀綱人才天下望豈但魯觀瞻清冷雙溪水髙寒半夜蟾時賢多自逸吾子獨能廉去去西湖路荷香漾酒帘樵雲獨唱巻五
