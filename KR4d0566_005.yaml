body:
  text: 樵雲獨唱卷五元葉顒撰律詩幽居雜興疏齋清夜醒修徑白雲長袖歸南山影心潛上國光西風巖桂老細雨野椒黃地僻人蹤少煙扉開竹房和張仲達客蘇州春暮覽古韻異國逢春暮驚心對日西湖生吳水冷雲壓楚山低老樹風霜古荒城煙雨迷夫差舊臺館花落鷓鴣啼重陽感興甲午嵗佳節明朝是同誰上翠微西風人易老南國雁初飛黃菊清香晚烏紗白髮稀牛山今昔異感慨欲沾衣次李本存見寄韻本存江西省掾尋調永喜巡檢秩滿寓婺之道林精含陶令歸官後琴書對酒杯未聞丹詔起長伴白雲來夢裡鄉關逺間中嵗月催草廬春漸暖應動武侯雷復次本存見寄韻寫興詩千首論心酒一杯初疑彭澤去旋喜謫仙來老歎青衫冷愁驚白髮催從今便髙卧鼻息撼春雷送應空谷上人逰吳尋師僕於湖山泉石有疇昔之好末章故及之逺近西湖路髙低釋氏宫猿啼青嶂月潮落碧江風鐘鼓殘陽外樓臺煙雨中挑包明日去回首白雲東落日南朝寺吟笻幾度登欲尋前日路去訪昔年僧浙水生新浪吳雲暗舊燈阿師如到彼為謝嶺南能題應上人淨深精舍一室絶纎塵爐煙貝葉經每呼明月至常遣白雲扃竹色侵虛幌荷香襲小亭晚來開甕牖放入數峰青代張匡敬送憲史武文獻遷浙西儒衡家世舊氣節老彌剛誰謂更千古猶能出一郎烏臺知姓字白簡凛風霜後夜吳江月清光應更長感懷天步艱難日人情向背秋慚無醫世術喜免抱官囚發憤尋青史消愁數白鷗草廬諸葛輩幸出為時謀午窗睡起偶吟間花落硯池小兒汝亷率爾應聲曰香絮粘棊局遂足成一律睡醒碧窗虛無人松影移庭空晴晝永徑靜夕陽遲香絮粘碁局間花落硯池時看煙樹鳥飛過白雲枝題扇面景物溪童雙眼碧照映緑波心釣艇橫煙水漁歌起夕隂峰巔涼月上澗底白雲深傲睨天風頂芳尊獨自斟小兒士廉賦碧桃胡蝶二詩呈改為賦唐律示之王母下瑶臺瓊花溢路栽似嫌紅粉俗長傍白雲開玉質風前舞天香月下來劉郎猶未識蜂蝶莫驚猜粉翅舞風輕雙飛趁晚晴聫翩花日暖來往栁煙清穿徑尋香絮過牆逐落英莊生千載夢驚醒世間情紙帳琴榻生虛白吟帷異馬融睡無紅霧入醒有白雲封月窟光千丈塵寰路萬重梅窗香影瘦清夢聽松風已酉新正天地風霜盡乾坤氣象和厯添新嵗月春滿舊山河梅栁芳容稚松篁老態多屠蘇成醉飲歡笑白雲窩七月望夕豫曳杖步月直造峰頂髙吟朗咏劃然長嘯興盡而返明日山下居人咸言聞清嘯驚醒塵夢者數十家豫因賦詩以紀其事云藜杖䇿風輕芒鞋步月明鶴翻青徑影猿度翠岩聲草露沾衣冷松泉潄石清崇岡發長嘯塵世夢驚醒九日東籬晚興杳杳柴桑路東籬對夕陽斷虹初霽雨新鴈欲迎霜黃菊秋香老烏紗雪鬢涼王𢎞人去逺目送楚峰長間居效陶體彭澤歸官後悠然對菊花風雲生杖履雨露蔚桑麻巷僻門常設樽空酒屢賖柴桑長在望三徑接晴霞憶先母憶别慈顔後年華逝水流萱堂猶一日松墓竟千秋誨育恩無盡生成德靡酬白雲空入望清淚濕衣裘已酉雪人世白雪封光輝萬境同江山迷夜月宇宙動春風栁絮髙情逺梨花舊夢空蹇驢懷鄭綮清賞灞橋東九日霜重鴈初飛江空蟹正肥黃花經雨瘦烏帽任風欹滿飲王𢎞酒豪吟杜牧詩東籬多感興况近夕陽時晚回自赤松小桃源賦二首仙子丹成後乘鸞翠靄間笙簫風細細環珮夜珊珊羊化雲埋石猿吟月滿山桃源春欲老花落夕陽間徑鎖緑苔新庭空市井塵草青岩洞雨松翠石林春初起名空在留侯迹已陳玉簫聲斷久片月下嶙峋觀史有感間中觀史册感慨淚澘然幸喜平生拙驚呼異代賢張良知説駕范蠡解乘船餘子乘酣者貪杯醉不眠雪水煎茶雪水烹佳茗寒江滚暮濤春風和凍煮霜葉帶氷燒陶榖聲名舊盧同氣味髙黨家寧辦此羔酒醉清宵癸丑新正試筆二首雪霽氷霜盡泥牛喜著鞭性情猶舊日節序又新年世態縈胸次春光耀目前屠蘇今日酒自笑不吾先舊臘隨宵盡新陽向曙來晴光浮竹葉春色滿椒杯稚緑粧梅萼嬌紅透杏腮雪消江岸栁便學舞章臺誕日前元己丑仲春豫知命之年賢甥童中州賦詩夀豫揆今二十五年矣甥亦五旬豫曾賦五言唐律一首今書於此云常憶埀弧日俄驚學易年髙情輕富貴雅志樂林泉白髮三千丈清吟數百篇行藏皆在我消長係乎天梅亭負暄梅屋朝暉暖融融體氣舒曲肱紅日裡閉目黑甜餘天地溫和候乾坤混沌初盎然春透髓盡晒腹中書小春探梅獨步孤山下來尋帶蘚枝江村流水晚沙路夕陽遲僧屋間雲徑人家小竹籬春風吹薄袂細細襲詩脾採蓮歌越女浙江頭煙波萬頃愁往來荷葉浦蕩漾木蘭舟島濶香雲冷江空明月秋清謳三四曲聲斷白蘋洲秋日有懷帥府李從道二首雨後復斜陽天風兩袖涼黃花秋夢淡紅葉晚晴長訪舊心千里澆愁酒一觴詩翁定何許西望白雲鄊子别金盆後煙嵐野鶴愁心應逰北里身尚寄南州落月雙溪夢西風一劍秋夕陽山下寺時憶昔年逰東方有一士東方有一士不結塵世緣朝卧空山雲暮汲石澗泉行吟夜月中醉舞春風前問之竟不答一笑三千年鑿井髙原鑿深井水流深淙淙三咽清肺腑凛然氷雪容雲埋石甃冷月照山泉空汲引君勿辭是中有神龍蠟梅春滿紫綃裳淡黃宫樣粧薔薇露下色山麝晚來香月下開金盞風前換玉裳尚餘風骨在踈影卧寒塘讀致和改元詔聖德如天大皇風四海清乾坤新嵗月邱壑舊心情詔旨宣金口臣僚拜玉京江南遺叟説埀老願升平懷湖山靈隱朋獨孤書記每憶湖山下煙嵐半有無西風肥芋栗細雨老菰蒲世事秋雲散禪心夜月孤輕包連瘦䇿吾亦夢江湖次韻送帥府李從道考滿赴都山中忘嵗月世上變炎涼竹帛虛名盛松關野興長贈詩無好句話别欠離觴道過濟南府光輝衣錦鄊送天台僧雪中入杭杖策路迢迢經年别石橋厭聽方廣磬去看浙江潮雪透麻鞋冷雲和布衲挑舊時清隱地月落故山遙憶三衢徐志允磊落三衢士身今在翰林滿斟徐邈酒髙誦杜陵吟燕北身名重江南感慨深金鑾坡上月應照故人心春夜逰西園春色晚來濃良宵興未窮海棠呈膩雪楊栁舞香風蝶夢翻花冷蟾光度酒空西園人未散飲罷滿城鐘訪赤松道士不值仙翁何處去殿古白雲深丹竈留殘火青煙鎖近林尚遺羊化石應誤鶴聽琴舊日同逰處山空住夕隂逰赤松宫二首杖履䇿天風桃源路萬重草藏羊化石雲護鶴巢松藥化留丹井蓮開老翠峰初平與初起吾亦願相從神仙遺舊宅地迥絶纎塵丹井雲封古青山雨洗新桃香巖洞雨芝老石田青近日來逰者多非避俗人贈修真羽士道人容貌古縹眇隔煙扉採藥穿雲去尋真跨鶴歸久嘗芝术味慣著芰荷衣拍手蓉峰頂相招上翠微題劉阮遇仙圗山中風景美劉阮此忘家犬吠尋真客泉香出洞花衣冠猶漢代飲饌入胡麻莫戀人間世人間日易斜贈漁父短笛逐秋風孤舟釣月中緑蓑煙浪逺白髮世情空不讓嚴陵操寧貪范蠡功江山無限好蘋白蓼花紅贈牧童牛背夕陽紅行行逐斷虹煙迷青嶂雨雲度小溪風短笛江村晚長吟宇宙空幾回芳草岸髙卧月明中春雨雲罩千山暗恩沾萬物春溶溶添細浪點點濕芳塵紅洗花容淨青滋栁色新東郊農事動漸快一犁人春晴曉洞雲歸濕春山草木新夭桃含宿雨嫩栁裊輕塵蝶翅寒猶怯蜂衙晚漸陳香風簇羅綺已有踏青人池塘春草春色滿寒漪萋萋欲染衣晚煙迷淺碧斜日映清輝靈運名空在王孫去不歸一春無好句詩夢近來稀梅邉索句茅舍白雲扉巡欄笑撚髭暗香覃雅思疏影入新詩江路東風冷溪山落月時苦吟吟未穩清興繞寒枝落梅一夜東風急南枝數片殘何人吹玉笛獨自倚朱闌落地魚鱗薄尋香蝶夢寒醉眠花樹下偏得夀陽歡題丹丘圗送周元善台州直學去去丹邱客雲山萬疊深吟鞭驅瘦馬倦僕負孤琴芹水鄉關夢蓉峰故舊心杏花明月下莫忘寄遺音和王存誠逰洞天昔我逰洞天意馬得休止平生塵土夢盡向滄浪洗回首名利場十年不挂齒去去青雲端褰衣訪平起宿智者草堂夜宿蓉峰下煙嵐鎖翠鬟鐘鳴黃葉寺月上碧雲關老虎蹲危石吟猿啼亂山明朝出城市清夢落塵寰智者寺僧往金陵聞子攜瓶錫孤舟至建康遽辭婁約寺遙禮寶公坊松子僧前落梅花客裏香莫同胡達磨無語達梁王贈宦逰張平叔乾坤英氣客湖海倦逰人看鏡始知老見人寧話貧功名驚壯志琴劍誤間身何日秋江上清波洗宦塵過栖碧何羽士舊隱泉石渾無恙仙翁去不回雲深香木老澗冷碧蓮開劍挂松關月丹遺藥灶灰昔年修煉地長誤鶴飛來代居官寄友不信宦逰拙功名未有成半生燕北老十載越南征每嘆黃金盡空驚白髮生何時燈火夜相與話歸耕久客寄鄰叟久客秋仍晚煙霞鎖敝廬晴江思共釣雲嶺憶同鋤貧賤交情薄飄零酒盞疏何當風雨夜歸讀舊時書霜晨二首殘月過樓臺霜鐘驚夢回畫開煨芋火撥盡滿爐灰旋整雲邉屐間尋雪裏梅春風深有意頻送暗香來琴榻對山城僧鐘半夜鳴玉簫音調逺紙帳夢魂清霜重蟾光冷山空鶴影驚南枝芳信動春色正關情霜夜霜冷月交輝春風暗透肌襟懷添醖藉胸次發新竒斟酌酬佳景推敲話舊詩暗香生薄袂疏影寫枯枝與客話湖山佳勝豫足不至者四十年因賦此以敘舊事不踏湖山路驚心四十秋六橋前日夢孤棹昔年逰嵗月浮雲改興亡逝水流西風吳嶠寺落日浙江樓幽齋秋晚木落逺山佳荆吳接兩淮秋深紅樹嶺人老白雲齋竹色頻侵袂苔痕欲上鞋宵深明月色清爽透吟懷山居即事吟榻障松屏巖扉護竹亭臨風梳白髮對月讀黃庭澗古千尋碧峰竒萬疊青彈琴坐雲石頻惹鶴來聽圍棋黑白未分時其中一著竒已空生死見寧墮戰爭危持重機常速爭先計或遲捐微存大勇勍敵盡吾歸日暮江村雜興二首杖屨陟崇邱絲綸釣淺洲衝煙逰野寺玩月上溪樓屢訪雲林鶴間盟沙路鷗漁歌音調美聲撼半江秋釣艇已收緡無人深閉門雲生沙上石月出水南村寂寞寒潮逺微茫煙浪昏孤舟中夜笛感慨動吟魂江村晚景華髮映清流江山事晚逰雲舒江影淨霜落水痕收鴈陳新橫浦蟾光欲上樓鐘鳴楓樹嶺秋老荻花洲孤舟夜泊舟一作洲煙棹越波東漁歌逐斷虹雲粘青樹冷潮駕翠濤空夢醒孤舟月情舒短笛風曲終秋漸老江濶暮山重漁舟晚泊釣艇近黃昏孤篷載夕曛煙潮歸栁港涼月出蒲根短笛雲端㺯清謳夜半聞漁燈明復滅寂寞度前村山莊即事二首倚檻看雲飛開簾放燕歸草生煙翠冷花落晚紅稀對酒歌金縷彈琴㺯玉徽醉醒深院月芳影上荷衣策杖步松關銜杯看逺山青鞋陪月出翠袖褁雲還芳草斜陽外落花流水間山林多樂意無夢到塵寰春晚春去欲何歸江南古路岐日長鶯燕懶花謝蝶蜂疑香徑紅應減髙峰翠益竒薰風琴調逺衆緑上芳枝晚窗紅日轉巖扉幽人清夢迷逺逰黃葉徑橫過白雲溪芳興隨流去髙情與嶺齊莊周身外蝶栩栩柏庭西山莊小隱茅屋小柴門前峯煙樹昏夕陽芳草徑霽雨落花村竹下安茶竈山邊置酒尊吟翁常欵曲佳句細評論辛丑年亂後歸故園亂後鬚兼白春來草復青水環埀釣石雲護讀書亭與客論孤憤從人笑獨醒艱難思避世貧賤欲忘形逰山夜宿僧寺翠袖倚天風雲封路萬重屢登猿嘯嶺頻撫鶴巢松漁唱孤舟曲僧撞半夜鐘山空禪榻冷月上礙星峰江村晚景野水溪橋外荒村八九家雨晴漁網晒風定酒旗斜紅樹霜江葉黃蘆月岸花何當從此隱重整釣雲槎題溪翁隱居小徑入雲斜幽居魏野家庭軒環竹石窗牖納煙霞户外經霜樹階前浥露花童沽村店酒婦煮石爐茶客至有客過山家停驂暫脫車旋呼徐邈酒新煮玉川茶命子開東閣呼童掃落