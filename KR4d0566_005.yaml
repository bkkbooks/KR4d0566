body:
  text: 樵雲獨唱巻五元葉顒撰律詩幽居雜興疎齋清夜醒修逕白雲長袖歸南山影心潜上國光西風巖桂老細雨野椒黄地僻人蹤少烟扉開竹房和張仲達客蘇州春暮覽古韻異國逢春暮驚心對日西湖生吴水冷雲壓楚山低老樹風霜古荒城烟雨迷夫差舊臺館花落鷓鴣啼重陽感興甲午嵗佳節明朝是同誰上翠㣲西風人易老南國雁初飛黄菊清香晚烏紗白髪稀牛山今昔異感慨欲沾衣次李本存見寄韻本存江西省掾尋調永喜廵檢秩滿寓婺之道林精含陶令歸官後琴書對酒杯未聞丹詔起長伴白雲来夢裡郷闗逺閑中嵗月催草廬春漸暖應動武侯雷復次本存見寄韻寫興詩千首論心酒一杯初疑彭澤去旋喜謫仙来老歎青衫冷愁驚白髪催從今便髙卧鼻息撼春雷送應空谷上人逰吴尋師僕於湖山泉石有疇昔之好末章故及之逺近西湖路髙低釋氏宫猿啼青嶂月潮落碧江風鐘鼓殘陽外樓臺烟雨中挑包明日去迴首白雲東落日南朝寺吟笻幾度登欲尋前日路去訪昔年僧浙水生新浪吴雲暗舊燈阿師如到彼為謝嶺南能題應上人净深精舍一室絶纎塵爐烟貝葉經毎呼明月至常遣白雲扃竹色侵虚幌荷香襲小亭晚来開甕牖放入數峰青代張匡敬送憲史武文獻遷浙西儒衡家世舊氣節老彌剛誰謂更千古猶能出一郎烏臺知姓字白簡凛風霜後夜吴江月清光應更長感懐天步艱難日人情向背秋慚無醫世術喜免抱官囚發憤尋青史消愁數白鷗草廬諸葛輩幸出為時謀午窓睡起偶吟閒花落硯池小兒汝亷率爾應聲曰香絮粘棊局遂足成一律睡醒碧窓虚無人松影移庭空晴晝永徑静夕陽遲香絮粘碁局閒花落硯池時看烟樹鳥飛過白雲枝題扇面景物溪童雙眼碧照映綠波心釣艇横烟水漁歌起夕隂峰巔凉月上澗底白雲深傲睨天風頂芳尊獨自斟小兒士廉賦碧桃胡蝶二詩呈改為賦唐律示之王母下瑶臺瓊花溢路栽似嫌紅粉俗長傍白雲開玉質風前舞天香月下来劉郎猶未識蜂蝶莫驚猜粉翅舞風輕雙飛趁晚晴聫翩花日暖来往栁烟清穿徑尋香絮過牆逐落英莊生千載夢驚醒世間情紙帳琴榻生虚白吟帷異馬融睡無紅霧入醒有白雲封月窟光千丈塵寰路萬重梅窓香影瘦清夢聽松風已酉新正天地風霜盡乾坤氣象和厯添新嵗月春滿舊山河梅栁芳容穉松篁老態多屠蘇成醉飲歡笑白雲窩七月望夕予曳杖步月直造峰頂髙吟朗咏劃然長嘯興盡而返明日山下居人咸言聞清嘯驚醒塵夢者數十家予因賦詩以紀其事云藜杖䇿風輕芒鞋步月明鶴翻青徑影猿度翠岩聲草露沾衣冷松泉潄石清崇崗發長嘯塵世夢驚醒九日東籬晚興杳杳柴桑路東籬對夕陽斷虹初霽雨新鴈欲迎霜黄菊秋香老烏紗雪鬢凉王𢎞人去逺目送楚峰長閑居效陶體彭澤歸官後悠然對菊花風雲生杖履雨露蔚桑麻巷僻門常設樽空酒屢賖柴桑長在望三徑接晴霞憶先母憶别慈顔後年華逝水流萱堂猶一日松墓竟千秋誨育恩無盡生成徳靡酬白雲空入望清淚濕衣裘已酉雪人世白雪封光輝萬境同江山迷夜月宇宙動春風栁絮髙情逺梨花舊夢空蹇驢懐鄭綮清賞㶚橋東九日霜重鴈初飛江空蟹正肥黄花經雨瘦烏㡌任風欹滿飲王𢎞酒豪吟杜牧詩東籬多感興况近夕陽時晚回自赤松小桃源賦二首仙子丹成後乗鸞翠靄間笙簫風細細環珮夜珊珊羊化雲埋石猿吟月滿山桃源春欲老花落夕陽間徑鎻緑苔新庭空市井塵草青岩洞雨松翠石林春初起名空在留侯跡已陳玉簫聲斷久片月下嶙峋觀史有感閑中觀史冊感慨淚澘然幸喜平生拙驚呼異代賢張良知説駕范蠡解乗船餘子乗酣者貪杯醉不眠雪水煎茶雪水烹佳茗寒江滚暮濤春風和凍煮霜葉帶氷燒陶榖聲名舊盧仝氣味髙黨家寜辦此羔酒醉清宵癸丑新正試筆二首雪霽氷霜盡泥牛喜著鞭性情猶舊日節序又新年世態縈胷次春光耀目前屠蘇今日酒自笑不吾先舊臘隨宵盡新陽向曙来晴光浮竹葉春色滿椒杯穉緑粧梅萼嬌紅透杏腮雪消江岸栁便學舞章臺誕日前元己丑仲春予知命之年賢甥童中州賦詩夀予揆今二十五年矣甥亦五旬予曾賦五言唐律一首今書於此云常憶埀弧日俄驚學易年髙情輕富貴雅志樂林泉白髪三千丈清吟數百篇行蔵皆在我消長係乎天梅亭負暄梅屋朝暉暖融融體氣舒曲肱紅日裡閉目黑甜餘天地温和候乾坤混沌初盎然春透髓盡晒腹中書小春探梅獨步孤山下来尋帶蘚枝江村流水晚沙路夕陽遲僧屋閑雲逕人家小竹籬春風吹薄袂細細襲詩脾採蓮歌越女浙江頭烟波萬頃愁往来荷葉浦蕩漾木蘭舟島濶香雲冷江空明月秋清謳三四曲聲斷白蘋洲秋日有懐帥府李從道二首雨後復斜陽天風兩袖凉黄花秋夢淡紅葉晚晴長訪舊心千里澆愁酒一觴詩翁定何許西望白雲鄊子别金盆後烟嵐野鶴愁心應逰北里身尚寄南州落月雙溪夢西風一劍秋夕陽山下寺時憶昔年逰東方有一士東方有一士不結塵世縁朝卧空山雲暮汲石澗泉行吟夜月中醉舞春風前問之竟不答一笑三千年鑿井髙原鑿深井水流深淙淙三嚥清肺腑凛然氷雪容雲埋石甃冷月照山泉空汲引君勿辭是中有神龍蠟梅春滿紫綃裳淡黄宫様粧薔薇露下色山麝晚来香月下開金盞風前換玉裳尚餘風骨在踈影卧寒塘讀致和改元詔聖徳如天大皇風四海清乾坤新嵗月邱壑舊心情詔㫖宣金口臣僚拜玉京江南遺叟説埀老願昇平懐湖山靈隠朋獨孤書記毎憶湖山下烟嵐半有無西風肥芋栗細雨老菰蒲世事秋雲散禪心夜月孤輕包連瘦䇿吾亦夢江湖次韻送帥府李從道考滿赴都山中忘嵗月世上變炎凉竹帛虚名盛松闗野興長贈詩無好句話别欠離觴道過濟南府光輝衣錦鄊送天台僧雪中入杭杖策路迢迢經年别石橋厭聽方廣磬去看浙江潮雪透麻鞋冷雲和布衲挑舊時清隠地月落故山遥憶三衢徐志允磊落三衢士身今在翰林滿斟徐邈酒髙誦杜陵吟燕北身名重江南感慨深金鑾坡上月應照故人心春夜逰西園春色晚来濃良宵興未窮海棠呈膩雪楊栁舞香風蝶夢翻花冷蟾光度酒空西園人未散飲罷滿城鐘訪赤松道士不值仙翁何處去殿古白雲深丹竈留殘火青烟鎻近林尚遺羊化石應誤鶴聴琴舊日同逰處山空住夕隂逰赤松宫二首杖履䇿天風桃源路萬重草蔵羊化石雲䕶鶴巢松藥化留丹井蓮開老翠峰初平與初起吾亦願相從神仙遺舊宅地迥絶纎塵丹井雲封古青山雨洗新桃香巖洞雨芝老石田青近日来逰者多非避俗人贈修真羽士道人容貌古縹緲隔烟扉採藥穿雲去尋真跨鶴歸久嘗芝术味慣著芰荷衣拍手蓉峰頂相招上翠㣲題劉阮遇仙圗山中風景美劉阮此忘家犬吠尋真客泉香出洞花衣冠猶漢代飲饌入胡麻莫戀人間世人間日易斜贈漁父短笛逐秋風孤舟釣月中緑蓑烟浪逺白髪世情空不讓嚴陵操寜貪范蠡功江山無限好蘋白蓼花紅贈牧童牛背夕陽紅行行逐斷虹烟迷青嶂雨雲度小溪風短笛江村晚長吟宇宙空㡬回芳草岸髙卧月明中春雨雲罩千山暗恩沾萬物春溶溶添細浪㸃㸃濕芳塵紅洗花容净青滋栁色新東郊農事動漸快一犁人春晴曉洞雲歸濕春山草木新夭桃含宿雨嫩栁裊輕塵蝶翅寒猶怯蜂衙晚漸陳香風簇羅綺已有踏青人池塘春草春色滿寒漪萋萋欲染衣晚烟迷淺碧斜日映清輝靈運名空在王孫去不歸一春無好句詩夢近来稀梅邉索句茅舍白雲扉廵欄笑撚髭暗香覃雅思疎影入新詩江路東風冷溪山落月時苦吟吟未穏清興遶寒枝落梅一夜東風急南枝數片殘何人吹玉笛獨自倚朱䦨落地魚鱗薄尋香蝶夢寒醉眠花樹下偏得夀陽歡題丹丘圗送周元善台州直學去去丹邱客雲山萬叠深吟鞭驅瘦馬倦僕負孤琴芹水郷闗夢蓉峰故舊心杏花明月下莫忘寄遺音和王存誠逰洞天昔我逰洞天意馬得休止平生塵土夢盡向滄浪洗回首名利塲十年不掛齒去去青雲端褰衣訪平起宿智者草堂夜宿蓉峰下烟嵐鎻翠鬟鐘鳴黄葉寺月上碧雲闗老虎蹲危石吟猿啼亂山明朝出城市清夢落塵寰智者寺僧往金陵聞子攜缾錫孤舟至建康遽辭婁約寺遥禮寳公坊松子僧前落梅花客裏香莫同胡達磨無語達梁王贈宦逰張平叔乾坤英氣客湖海倦逰人看鏡始知老見人寜話貧功名驚壯志琴劍誤閑身何日秋江上清波洗宦塵過栖碧何羽士舊隠泉石渾無恙仙翁去不回雲深香木老澗冷碧蓮開劍掛松闗月丹遺藥灶灰昔年修煉地長誤鶴飛来代居官寄友不信宦逰拙功名未有成半生燕北老十載越南征每嘆黄金盡空驚白髪生何時燈火夜相與話歸耕久客寄隣叟久客秋仍晚烟霞鎻敝廬晴江思共釣雲嶺憶同鋤貧賤交情薄飄零酒盞疎何當風雨夜歸讀舊時書霜晨二首殘月過樓臺霜鐘驚夢回畫開煨芋火撥盡滿爐灰旋整雲邉屐閑尋雪裏梅春風深有意頻送暗香来琴榻對山城僧鐘半夜鳴玉簫音調逺紙帳夢魂清霜重蟾光冷山空鶴影驚南枝芳信動春色正關情霜夜霜冷月交輝春風暗透肌襟懐添醖藉胷次發新竒斟酌酬佳景推敲話舊詩暗香生薄袂疎影冩枯枝與客話湖山佳勝予足不至者四十年因賦此以叙舊事不踏湖山路驚心四十秋六橋前日夢孤棹昔年逰嵗月浮雲改興亡逝水流西風吴嶠寺落日浙江樓幽齋秋晚木落逺山佳荆吴接兩淮秋深紅樹嶺人老白雲齋竹色頻侵袂苔痕欲上鞋宵深明月色清爽透吟懐山居即事吟榻障松屏巖扉䕶竹亭臨風梳白髪對月讀黄庭澗古千尋碧峰竒萬叠青彈琴坐雲石頻惹鶴来聽圍棋黑白未分時其中一著竒已空生死見寜墮戰争危持重機常速争先計或遲捐㣲存大勇勍敵盡吾歸日暮江村雜興二首杖屨陟崇邱絲綸釣淺洲衝煙逰野寺玩月上溪樓屢訪雲林鶴閑盟沙路鷗漁歌音調美聲撼半江秋釣艇已收緡無人深閉門雲生沙上石月出水南村寂寞寒潮逺㣲茫烟浪昏孤舟中夜笛感慨動吟魂江村晚景華髮映清流江山事晚逰雲舒江影净霜落水痕収鴈陣新横浦蟾光欲上樓鐘鳴楓樹嶺秋老荻花洲孤舟夜泊舟一作洲烟棹越波東漁歌逐斷虹雲粘青樹冷潮駕翠濤空夢醒孤舟月情舒短笛風曲終秋漸老江濶暮山重漁舟晚泊釣艇近黄昏孤篷載夕曛烟潮歸栁港凉月出蒲根短笛雲端㺯清謳夜半聞漁燈明復㓕寂寞度前村山莊即事二首倚檻看雲飛開簾放燕歸草生烟翠冷花落晚紅稀對酒歌金縷彈琴㺯玉徽醉醒深院月芳影上荷衣策杖步松闗啣杯看逺山青鞋陪月出翠袖褁雲還芳草斜陽外落花流水間山林多樂意無夢到塵寰春晚春去欲何歸江南古路岐日長鶯燕懶花謝蝶蜂疑香逕紅應减髙峰翠益竒薰風琴調逺衆緑上芳枝晚窓紅日轉巖扉幽人清夢迷逺逰黄葉徑横過白雲谿芳興隨流去髙情與嶺齊莊周身外蝶栩栩栢庭西山莊小隠茅屋小柴門前峯烟樹昏夕陽芳草徑霽雨落花村竹下安茶竈山邊置酒尊吟翁常欵曲佳句細評論辛丑年亂後歸故園亂後鬚兼白春来草復青水環埀釣石雲䕶讀書亭與客論孤憤從人笑獨醒艱難思避世貧賤欲忘形逰山夜宿僧寺翠袖倚天風雲封路萬重屢登猿嘯嶺頻撫鶴巢松漁唱孤舟曲僧撞半夜鐘山空禅榻冷月上碍星峰江邨晚景野水溪橋外荒村八九家雨晴漁網晒風定酒旗斜紅樹霜江葉黄蘆月岸花何當從此隠重整釣雲槎題溪翁隠居小徑入雲斜幽居魏野家庭軒環竹石牕牖納烟霞户外經霜樹堦前浥露花童沽邨店酒婦煮石爐茶客至有客過山家停驂暫脫車旋呼徐邈酒新煮玉川茶命子開東閣呼童掃落